<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel del Gran Tesorero</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --azul: #0a192f; --dorado: #f9e29b; --verde: #2ecc71; --rojo: #e74c3c; }
        body { font-family: 'Lora', serif; background: var(--azul); color: white; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { font-family: 'Cinzel'; color: var(--dorado); text-align: center; }
        table { width: 100%; border-collapse: collapse; background: #112240; border-radius: 10px; overflow: hidden; }
        th { background: rgba(197, 160, 89, 0.2); color: var(--dorado); padding: 15px; font-family: 'Cinzel'; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .btn-validar { background: var(--verde); color: var(--azul); border: none; padding: 8px 15px; border-radius: 5px; font-family: 'Cinzel'; font-weight: bold; cursor: pointer; }
        .btn-validar:disabled { background: #555; cursor: not-allowed; }
        .status-pill { padding: 5px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        .mora { background: rgba(231, 76, 60, 0.2); color: var(--rojo); border: 1px solid var(--rojo); }
        .aplomo { background: rgba(46, 204, 113, 0.2); color: var(--verde); border: 1px solid var(--verde); }
    </style>
</head>
<body>

<div class="container">
    <h1>Control de Gran Tesorería</h1>
    <table id="tablaLogias">
        <thead>
            <tr>
                <th>Logia</th>
                <th>Último Mes</th>
                <th>Conceptos</th>
                <th>Saldo</th>
                <th>Estado</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody id="cuerpoTabla"></tbody>
    </table>
</div>

<script>
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRHtXI5LY1DF7e6sHplXRgzQhk1yHaSZ7lKXUZvY2dTtkUKc29RvzZzCM6FffbYxoFWeIMst9ZKeP10/pub?gid=0&single=true&output=csv"; 
    const SCRIPT_URL = "TU_URL_DE_APPS_SCRIPT_AQUI"; // La que copiaste en el paso 1

    function cargarDatos() {
        Papa.parse(CSV_URL, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(results) {
                const logias = results.data.filter(r => r.nombre_logia);
                renderizar(logias);
            }
        });
    }

    function renderizar(data) {
        const tabla = document.getElementById('cuerpoTabla');
        tabla.innerHTML = '';
        data.forEach(item => {
            const saldo = parseFloat(item.saldo || 0);
            const esMora = saldo > 0;
            const fila = document.createElement('tr');
            fila.innerHTML = `
                <td><b>${item.nombre_logia}</b></td>
                <td>${item.mes_pago}</td>
                <td style="font-size:0.8rem">${item.cargos}</td>
                <td style="color:${esMora ? 'var(--rojo)' : 'var(--verde)'}">$${saldo.toLocaleString()}</td>
                <td><span class="status-pill ${esMora ? 'mora' : 'aplomo'}">${esMora ? 'EN MORA' : 'EN APLOMO'}</span></td>
                <td>
                    ${esMora ? `<button class="btn-validar" onclick="confirmarPago('${item.usuario}', this)">VALIDAR</button>` : '✅'}
                </td>
            `;
            tabla.appendChild(fila);
        });
    }

    async function confirmarPago(idUsuario, boton) {
        if (!confirm("¿Deseas marcar esta Logia como 'EN APLOMO' y poner el saldo en $0?")) return;
        
        boton.disabled = true;
        boton.innerText = "...";

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', // Importante para evitar errores de CORS con Google
                body: JSON.stringify({ usuario: idUsuario })
            });
            alert("Operación enviada. Los cambios se verán reflejados en el Sheet en unos segundos.");
            setTimeout(() => location.reload(), 2000);
        } catch (e) {
            alert("Error al conectar con el servidor.");
            boton.disabled = false;
        }
    }

    window.onload = cargarDatos;
</script>
</body>
</html>
