<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gran Tesorería | Panel Administrativo</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --azul-fondo: #0a192f;
            --azul-card: #112240;
            --dorado: #f9e29b;
            --dorado-osc: #c5a059;
            --blanco: #e6f1ff;
            --verde: #2ecc71;
            --rojo: #e74c3c;
        }

        body {
            font-family: 'Lora', serif;
            background-color: var(--azul-fondo);
            color: var(--blanco);
            margin: 0;
            padding: 20px;
            background-image: radial-gradient(circle at center, #112240 0%, #0a192f 100%);
        }

        .container { max-width: 1100px; margin: 0 auto; }

        /* --- ENCABEZADO --- */
        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--dorado-osc);
            padding-bottom: 20px;
        }
        .logo-encabezado { width: 100px; filter: drop-shadow(0 0 10px var(--dorado)); margin-bottom: 10px; }
        h1 { font-family: 'Cinzel'; color: var(--dorado); font-size: 1.8rem; margin: 0; letter-spacing: 2px; }
        .sub-titulo { font-family: 'Cinzel'; font-size: 0.8rem; color: var(--dorado-osc); letter-spacing: 4px; }

        /* --- FORMULARIO DE CARGOS --- */
        .admin-box {
            background: var(--azul-card);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--dorado-osc);
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .admin-box h3 { font-family: 'Cinzel'; color: var(--dorado); margin-top: 0; font-size: 1rem; border-bottom: 1px solid rgba(197, 160, 89, 0.2); padding-bottom: 10px; }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        input, select {
            background: rgba(10, 25, 47, 0.8);
            border: 1px solid var(--dorado-osc);
            padding: 12px;
            color: white;
            border-radius: 6px;
            outline: none;
            font-family: 'Lora';
        }

        /* --- BOTONES --- */
        .btn-primario { background: var(--dorado-osc); color: var(--azul-fondo); border: none; padding: 12px; border-radius: 6px; font-family: 'Cinzel'; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-primario:hover { background: var(--dorado); transform: translateY(-2px); }
        
        .btn-validar { background: var(--verde); color: var(--azul-fondo); border: none; padding: 8px 12px; border-radius: 4px; font-family: 'Cinzel'; font-weight: bold; cursor: pointer; font-size: 0.7rem; }
        .btn-validar:hover { background: #27ae60; }

        /* --- TABLA --- */
        .table-wrapper { background: var(--azul-card); border-radius: 12px; border: 1px solid rgba(197, 160, 89, 0.3); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: rgba(197, 160, 89, 0.1); color: var(--dorado); padding: 15px; font-family: 'Cinzel'; font-size: 0.7rem; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }

        .status-pill { padding: 5px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; font-family: 'Cinzel'; }
        .mora { background: rgba(231, 76, 60, 0.1); color: var(--rojo); border: 1px solid var(--rojo); }
        .aplomo { background: rgba(46, 204, 113, 0.1); color: var(--verde); border: 1px solid var(--verde); }

        .btn-logout { margin-top: 30px; display: inline-block; color: var(--dorado-osc); text-decoration: none; font-family: 'Cinzel'; font-size: 0.7rem; border: 1px solid var(--dorado-osc); padding: 10px 20px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="logo_moderno.png" class="logo-encabezado">
        <h1>OFICINA DE GRAN TESORERÍA</h1>
        <div class="sub-titulo">Gestión de Cargos y Validación de Pagos</div>
    </header>

    <div class="admin-box">
        <h3><i class="fas fa-plus-circle"></i> Nueva Orden de Cargo</h3>
        <div class="form-grid">
            <select id="selectLogia">
                <option value="">Seleccionar Logia...</option>
            </select>
            <input type="text" id="conceptoCargo" placeholder="Concepto (Ej: Capitas, Iniciación)">
            <input type="number" id="montoCargo" placeholder="Monto $">
            <button class="btn-primario" onclick="aplicarCargo()">APLICAR CARGO</button>
        </div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Logia</th>
                    <th>Mes</th>
                    <th>Concepto Actual</th>
                    <th>Saldo Pendiente</th>
                    <th>Estado</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="tableContent"></tbody>
        </table>
    </div>

    <center>
        <a href="identificacion.html" class="btn-logout" onclick="sessionStorage.clear()">CERRAR SESIÓN SEGURA</a>
    </center>
</div>

<script>
    // --- CONFIGURACIÓN ---
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRHtXI5LY1DF7e6sHplXRgzQhk1yHaSZ7lKXUZvY2dTtkUKc29RvzZzCM6FffbYxoFWeIMst9ZKeP10/pub?gid=0&single=true&output=csv"; 
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzKxIRfEbQW5lYmWuBpR4j-Wr_4S7gL0v_f2ri-jH_3_1elGZZ0bT0qcTjlvLqY99I8Nw/exec"; 

    function cargarDatos() {
        Papa.parse(SHEET_CSV_URL, {
            download: true,
            header: true,
            dynamicTyping: true,
            complete: function(results) {
                const data = results.data.filter(row => row.nombre_logia);
                renderizar(data);
                poblarSelector(data);
            }
        });
    }

    function renderizar(data) {
        const tbody = document.getElementById('tableContent');
        tbody.innerHTML = '';

        data.forEach(item => {
            const saldo = parseFloat(item.saldo || 0);
            const tieneDeuda = saldo > 0;
            const row = document.createElement('tr');

            row.innerHTML = `
                <td>
                    <b>${item.nombre_logia}</b>
                    <div style="font-size:0.7rem; color:var(--dorado-osc)">ID: ${item.usuario}</div>
                </td>
                <td>${item.mes_pago || '---'}</td>
                <td style="font-size:0.8rem; font-style:italic;">${item.cargos || 'Sin cargos'}</td>
                <td style="font-weight:bold; color:${tieneDeuda ? 'var(--rojo)' : 'var(--verde)'}">
                    $${saldo.toLocaleString('en-US', {minimumFractionDigits: 2})}
                </td>
                <td>
                    <span class="status-pill ${tieneDeuda ? 'mora' : 'aplomo'}">
                        ${tieneDeuda ? 'EN MORA' : 'EN APLOMO'}
                    </span>
                </td>
                <td>
                    ${tieneDeuda ? 
                        `<button class="btn-validar" onclick="enviarAccion('VALIDAR', '${item.usuario}')">VALIDAR</button>` : 
                        '✅'}
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    function poblarSelector(data) {
        const select = document.getElementById('selectLogia');
        select.innerHTML = '<option value="">Seleccionar Logia...</option>';
        data.forEach(l => {
            let opt = document.createElement('option');
            opt.value = l.usuario;
            opt.text = l.nombre_logia;
            select.add(opt);
        });
    }

    async function aplicarCargo() {
        const user = document.getElementById('selectLogia').value;
        const concepto = document.getElementById('conceptoCargo').value;
        const monto = document.getElementById('montoCargo').value;
        
        if(!user || !monto || !concepto) return alert("Completa todos los campos del cargo.");
        if(!confirm(`¿Aplicar cargo de $${monto} a esta logia?`)) return;

        await enviarAccion('CARGAR', user, monto, concepto);
    }

    async function enviarAccion(tipo, idUsuario, monto = 0, concepto = "") {
        const loadingMsg = tipo === 'VALIDAR' ? "Validando pago..." : "Aplicando cargo...";
        console.log(loadingMsg);

        try {
            // Obtenemos el mes actual en español
            const mesActual = new Date().toLocaleString('es-MX', {month: 'long'}).toUpperCase();

            await fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ 
                    accion: tipo, 
                    usuario: idUsuario, 
                    monto: monto, 
                    concepto: concepto,
                    mes: mesActual
                })
            });
            
            alert("Operación exitosa. La tabla se actualizará en breve.");
            setTimeout(() => location.reload(), 2000);
        } catch (e) {
            alert("Error al conectar con el servidor.");
        }
    }

    window.onload = cargarDatos;
</script>

</body>
</html>
