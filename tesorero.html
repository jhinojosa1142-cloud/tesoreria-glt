<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesorería | Archivum Digitalis</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { 
            --azul: #0a192f; --azul-l: #112240; --dorado: #f9e29b; 
            --dorado-osc: #c5a059; --blanco: #e6f1ff; --rojo: #ff4d4d; --verde: #2ecc71;
        }

        body { 
            font-family: 'Lora', serif; background: var(--azul); 
            color: var(--blanco); margin: 0; padding: 20px; padding-top: 80px;
        }

        h1, h2 { font-family: 'Cinzel'; color: var(--dorado); letter-spacing: 2px; text-align: center; }

        /* --- SIDEBAR & NAV --- */
        .sidebar { height: 100%; width: 0; position: fixed; z-index: 2000; top: 0; left: 0; background-color: var(--azul-l); overflow-x: hidden; transition: 0.5s; padding-top: 60px; border-right: 2px solid var(--dorado-osc); }
        .sidebar a { padding: 15px 30px; text-decoration: none; font-size: 0.9rem; color: var(--dorado); display: block; transition: 0.3s; font-family: 'Cinzel'; }
        .sidebar a:hover { background: rgba(197, 160, 89, 0.1); color: white; }
        .sidebar .closebtn { position: absolute; top: 0; right: 25px; font-size: 36px; }
        .openbtn { font-size: 18px; cursor: pointer; background: var(--azul-l); color: var(--dorado); padding: 10px 15px; border: 1px solid var(--dorado-osc); position: fixed; top: 20px; left: 20px; border-radius: 5px; z-index: 1000; font-family: 'Cinzel'; }
        .btn-logout { position: fixed; top: 20px; right: 20px; background: var(--rojo); color: white; border: none; padding: 10px 15px; border-radius: 5px; font-family: 'Cinzel'; font-size: 0.7rem; cursor: pointer; z-index: 1001; }

        /* --- CONTENEDORES --- */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--azul-l); padding: 20px; border: 1px solid var(--dorado-osc); border-radius: 10px; text-align: center; }
        .stat-card h3 { margin: 0; font-size: 0.8rem; color: var(--dorado-osc); font-family: 'Cinzel'; }
        .stat-card p { margin: 10px 0 0; font-size: 1.5rem; font-weight: bold; color: var(--dorado); }

        /* --- TABLA --- */
        .search-container { margin-bottom: 20px; text-align: center; }
        #searchInput { width: 80%; padding: 12px; border-radius: 5px; border: 1px solid var(--dorado-osc); background: var(--azul-l); color: white; font-family: 'Lora'; }
        
        table { width: 100%; border-collapse: collapse; background: var(--azul-l); border-radius: 10px; overflow: hidden; }
        th { background: var(--dorado-osc); color: var(--azul); font-family: 'Cinzel'; padding: 15px; font-size: 0.8rem; }
        td { padding: 12px; border-bottom: 1px solid rgba(197,160,89,0.1); text-align: center; font-size: 0.9rem; }
        .status-badge { padding: 5px 10px; border-radius: 15px; font-size: 0.7rem; font-weight: bold; font-family: 'Cinzel'; }
        .bg-ok { background: rgba(46, 204, 113, 0.2); color: var(--verde); }
        .bg-alert { background: rgba(255, 77, 77, 0.2); color: var(--rojo); }
    </style>
</head>
<body>

<div id="mySidebar" class="sidebar">
  <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
  <a href="pasaporte.html">Mi Pasaporte</a>
  <a href="secretario.html" id="linkSec" style="display:none;">Secretaría</a>
  <a href="tesorero.html" id="linkTes">Tesorería</a>
  <hr style="opacity:0.2">
  <a href="#" onclick="cerrarSesion()" style="color:var(--rojo);">Cerrar Sesión</a>
</div>

<button class="openbtn" onclick="openNav()">&#9776; MENÚ</button>
<button class="btn-logout" onclick="cerrarSesion()">CERRAR SESIÓN</button>

<h1>PANEL DE TESORERÍA</h1>
<p style="text-align:center; font-family:'Cinzel'; font-size:0.7rem; color:var(--dorado-osc);">GESTIÓN FINANCIERA - GRAN LOGIA DE TAMAULIPAS</p>

<div class="stats-grid">
    <div class="stat-card">
        <h3>HERMANOS AL CORRIENTE</h3>
        <p id="totalOk">0</p>
    </div>
    <div class="stat-card">
        <h3>EN MORA</h3>
        <p id="totalMora" style="color:var(--rojo)">0</p>
    </div>
</div>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="Buscar hermano por nombre o ID..." onkeyup="filtrarTabla()">
</div>

<table>
    <thead>
        <tr>
            <th>ID MASÓNICO</th>
            <th>NOMBRE COMPLETO</th>
            <th>LOGIA</th>
            <th>ÚLTIMO PAGO</th>
            <th>ESTADO CUENTA</th>
        </tr>
    </thead>
    <tbody id="cuerpoTesorería">
        </tbody>
</table>

<script>
    // --- CONFIGURACIÓN ---
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRHtXI5LY1DF7e6sHplXRgzQhk1yHaSZ7lKXUZvY2dTtkUKc29RvzZzCM6FffbYxoFWeIMst9ZKeP10/pub?gid=838211030&single=true&output=csv"; // URL de tu Google Sheet (Membresia)

    window.onload = function() {
        // Protección de Ruta
        const rol = sessionStorage.getItem("rolUsuario");
        if (rol !== "Tesorero" && rol !== "Secretario") {
            alert("Acceso Restringido a Tesorería.");
            window.location.href = "identificacion.html";
        }
        if (rol === "Secretario") {
            document.getElementById("linkSec").style.display = "block";
        }
        cargarFinanzas();
    };

    function cargarFinanzas() {
        Papa.parse(CSV_URL, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                const cuerpo = document.getElementById('cuerpoTesorería');
                const data = results.data;
                cuerpo.innerHTML = "";
                
                let okCount = 0;
                let moraCount = 0;

                data.forEach(h => {
                    // Lógica simple: Si la columna "Estado" (Col H) dice "ACTIVO" se considera al corriente para este ejemplo
                    // Puedes cambiar esto por una columna de "Deuda" si la tienes
                    const estadoFinanciero = (h.Estado || h.estado || "ACTIVO").toUpperCase();
                    const esMora = estadoFinanciero === "MOROSO" || estadoFinanciero === "SUSPENDIDO";
                    
                    if (esMora) moraCount++; else okCount++;

                    const row = `<tr>
                        <td>${h.ID_Masonico || "---"}</td>
                        <td style="text-align:left">${h.Nombre || "---"}</td>
                        <td>${h.Logia || "---"}</td>
                        <td>${h.Fecha_Iniciacion || "No reg."}</td>
                        <td>
                            <span class="status-badge ${esMora ? 'bg-alert' : 'bg-ok'}">
                                ${esMora ? 'PENDIENTE' : 'AL CORRIENTE'}
                            </span>
                        </td>
                    </tr>`;
                    cuerpo.innerHTML += row;
                });

                document.getElementById('totalOk').innerText = okCount;
                document.getElementById('totalMora').innerText = moraCount;
            }
        });
    }

    // --- NAVEGACIÓN ---
    function openNav() { document.getElementById("mySidebar").style.width = "250px"; }
    function closeNav() { document.getElementById("mySidebar").style.width = "0"; }
    function cerrarSesion() { sessionStorage.clear(); window.location.href = "identificacion.html"; }

    function filtrarTabla() {
        const input = document.getElementById("searchInput").value.toUpperCase();
        const tr = document.getElementById("cuerpoTesorería").getElementsByTagName("tr");
        for (let i = 0; i < tr.length; i++) {
            const txt = tr[i].textContent || tr[i].innerText;
            tr[i].style.display = txt.toUpperCase().indexOf(input) > -1 ? "" : "none";
        }
    }
</script>

</body>
</html>
