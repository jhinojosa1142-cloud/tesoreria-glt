<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gran Tesorería | Panel de Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --azul-fondo: #0a192f;
            --azul-card: #112240;
            --dorado: #f9e29b;
            --dorado-osc: #c5a059;
            --blanco: #e6f1ff;
            --verde: #2ecc71;
            --rojo: #e74c3c;
        }

        body {
            font-family: 'Lora', serif;
            background-color: var(--azul-fondo);
            color: var(--blanco);
            margin: 0;
            padding: 20px;
            background-image: radial-gradient(circle at center, #112240 0%, #0a192f 100%);
        }

        .container { max-width: 1100px; margin: 0 auto; }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px solid var(--dorado-osc);
            padding-bottom: 25px;
        }

        .logo-glt { width: 75px; filter: drop-shadow(0 0 8px var(--dorado)); }
        h1 { font-family: 'Cinzel'; color: var(--dorado); font-size: 1.8rem; margin: 15px 0 5px; letter-spacing: 2px; }
        .role-tag { font-family: 'Cinzel'; font-size: 0.8rem; color: var(--dorado-osc); letter-spacing: 4px; text-transform: uppercase; }

        /* --- DASHBOARD STATS --- */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--azul-card);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(197, 160, 89, 0.2);
            text-align: center;
        }

        .stat-card span { display: block; font-family: 'Cinzel'; font-size: 0.7rem; color: var(--dorado-osc); margin-bottom: 10px; }
        .stat-card .val { font-size: 2rem; font-weight: bold; }

        /* --- CONTROLES --- */
        .search-container { margin-bottom: 20px; }
        .search-input {
            width: 100%;
            padding: 15px;
            background: var(--azul-card);
            border: 1px solid var(--dorado-osc);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
            font-family: 'Lora';
        }

        /* --- TABLA --- */
        .table-wrapper {
            background: var(--azul-card);
            border-radius: 12px;
            border: 1px solid rgba(197, 160, 89, 0.3);
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: rgba(197, 160, 89, 0.1); color: var(--dorado); padding: 18px; font-family: 'Cinzel'; font-size: 0.75rem; border-bottom: 1px solid var(--dorado-osc); }
        td { padding: 18px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; vertical-align: middle; }

        .status-pill { padding: 6px 12px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; font-family: 'Cinzel'; }
        .aplomo { background: rgba(46, 204, 113, 0.15); color: var(--verde); border: 1px solid var(--verde); }
        .mora { background: rgba(231, 76, 60, 0.15); color: var(--rojo); border: 1px solid var(--rojo); }

        .desc-cargo { font-size: 0.8rem; color: #aab4c2; font-style: italic; max-width: 250px; }

        .btn-salir {
            margin-top: 30px;
            display: inline-block;
            color: var(--dorado-osc);
            text-decoration: none;
            font-family: 'Cinzel';
            font-size: 0.7rem;
            border: 1px solid var(--dorado-osc);
            padding: 10px 25px;
            border-radius: 5px;
            transition: 0.3s;
        }
        .btn-salir:hover { background: var(--dorado-osc); color: var(--azul-fondo); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="logo_moderno.png" class="logo-glt">
        <h1>Gran Tesorería</h1>
        <div class="role-tag">Control Financiero de Talleres</div>
    </header>

    <div class="summary-grid">
        <div class="stat-card">
            <span>Talleres en Lista</span>
            <div class="val" id="total-val">0</div>
        </div>
        <div class="stat-card">
            <span>En Aplomo</span>
            <div class="val" id="aplomo-val" style="color: var(--verde);">0</div>
        </div>
        <div class="stat-card">
            <span>En Mora</span>
            <div class="val" id="mora-val" style="color: var(--rojo);">0</div>
        </div>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="Buscar por Logia, Mes o Concepto (Iniciación, Capitas...)" onkeyup="filterTable()">
    </div>

    <div class="table-wrapper">
        <table id="logiasTable">
            <thead>
                <tr>
                    <th>Logia Simbólica</th>
                    <th>Mes Pagado</th>
                    <th>Concepto de Cargos</th>
                    <th>Saldo Pendiente</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="tableContent">
                </tbody>
        </table>
    </div>

    <center>
        <a href="identificacion.html" class="btn-salir" onclick="sessionStorage.clear()">CERRAR SESIÓN SEGURA</a>
    </center>
</div>

<script>
    // URL CSV de la pestaña Sheet1 (Asegúrate de publicar la hoja como CSV)
    const SHEET1_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRHtXI5LY1DF7e6sHplXRgzQhk1yHaSZ7lKXUZvY2dTtkUKc29RvzZzCM6FffbYxoFWeIMst9ZKeP10/pub?gid=0&single=true&output=csv";

    function loadSheetData() {
        Papa.parse(SHEET1_CSV_URL, {
            download: true,
            header: true,
            dynamicTyping: true,
            skipEmptyLines: true,
            complete: function(results) {
                const data = results.data.filter(row => row.nombre_logia);
                renderTable(data);
                updateStats(data);
            }
        });
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableContent');
        tbody.innerHTML = '';

        data.forEach(item => {
            const row = document.createElement('tr');
            
            // Lógica basada en SALDO
            const saldoNum = parseFloat(item.saldo || 0);
            const tieneDeuda = saldoNum > 0;
            
            const badgeClass = tieneDeuda ? 'mora' : 'aplomo';
            const badgeText = tieneDeuda ? 'EN MORA' : 'EN APLOMO';

            row.innerHTML = `
                <td>
                    <div style="font-weight:bold; color:var(--dorado)">${item.nombre_logia}</div>
                    <div style="font-size:0.75rem; color:var(--dorado-osc)">Usuario: ${item.usuario}</div>
                </td>
                <td style="text-align:center;">${item.mes_pago || '---'}</td>
                <td class="desc-cargo">${item.cargos || 'Sin descripción'}</td>
                <td style="color: ${tieneDeuda ? 'var(--rojo)' : 'var(--verde)'}; font-weight:bold; font-family: monospace; font-size: 1rem;">
                    $${saldoNum.toLocaleString('en-US', {minimumFractionDigits: 2})}
                </td>
                <td><span class="status-pill ${badgeClass}">${badgeText}</span></td>
            `;
            tbody.appendChild(row);
        });
    }

    function updateStats(data) {
        const total = data.length;
        const mora = data.filter(i => parseFloat(i.saldo || 0) > 0).length;
        const aplomo = total - mora;

        document.getElementById('total-val').innerText = total;
        document.getElementById('aplomo-val').innerText = aplomo;
        document.getElementById('mora-val').innerText = mora;
    }

    function filterTable() {
        const input = document.getElementById("searchInput").value.toUpperCase();
        const rows = document.getElementById("tableContent").getElementsByTagName("tr");

        for (let i = 0; i < rows.length; i++) {
            const text = rows[i].innerText.toUpperCase();
            rows[i].style.display = text.indexOf(input) > -1 ? "" : "none";
        }
    }

    window.onload = loadSheetData;
</script>

</body>
</html>
