<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gran Secretaría | Gestión de Padrón</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --azul: #0a192f; --azul-l: #112240; --dorado: #f9e29b; --dorado-osc: #c5a059; --blanco: #e6f1ff; --verde: #2ecc71; }
        body { font-family: 'Lora', serif; background: var(--azul); color: var(--blanco); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        header { text-align: center; border-bottom: 2px solid var(--dorado-osc); padding-bottom: 20px; margin-bottom: 30px; }
        h1 { font-family: 'Cinzel'; color: var(--dorado); margin: 0; letter-spacing: 3px; }

        /* Herramientas de Búsqueda */
        .toolbar { display: flex; gap: 15px; background: var(--azul-l); padding: 20px; border-radius: 10px; border: 1px solid rgba(197, 160, 89, 0.3); margin-bottom: 20px; align-items: center; }
        input, select { background: var(--azul); border: 1px solid var(--dorado-osc); padding: 12px; color: white; border-radius: 5px; outline: none; }
        .search-input { flex: 2; }
        .filter-select { flex: 1; }
        .btn-nuevo { background: var(--dorado-osc); color: var(--azul); border: none; padding: 12px 25px; border-radius: 5px; font-family: 'Cinzel'; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-nuevo:hover { background: var(--dorado); transform: translateY(-2px); }

        /* Tabla de Padrón */
        .table-container { background: var(--azul-l); border-radius: 10px; overflow: hidden; border: 1px solid rgba(197, 160, 89, 0.2); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: rgba(197, 160, 89, 0.1); color: var(--dorado); padding: 15px; font-family: 'Cinzel'; font-size: 0.75rem; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.9rem; }
        .grado-tag { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; background: var(--dorado-osc); color: var(--azul); }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: var(--azul-l); padding: 30px; border-radius: 15px; border: 2px solid var(--dorado); width: 90%; max-width: 600px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .full-width { grid-column: span 2; }
        label { display: block; font-family: 'Cinzel'; font-size: 0.65rem; color: var(--dorado-osc); margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>GRAN SECRETARÍA</h1>
        <p style="font-family:'Cinzel'; font-size: 0.7rem; letter-spacing: 2px; color: var(--dorado-osc);">Archivum Digitalis - Gestión de Membresía</p>
    </header>

    <div class="toolbar">
        <input type="text" id="inputBuscar" class="search-input" placeholder="Buscar por Nombre del Hermano..." oninput="filtrarTabla()">
        <select id="filtroLogia" class="filter-select" onchange="filtrarTabla()">
            <option value="">Todas las Logias</option>
        </select>
        <button class="btn-nuevo" onclick="abrirModal()">+ NUEVO INGRESO</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Folio/ID</th>
                    <th>Nombre del Hermano</th>
                    <th>Logia Simbólica</th>
                    <th>Grado</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="padrónContent">
                </tbody>
        </table>
    </div>
</div>

<div id="modalAlta" class="modal">
    <div class="modal-content">
        <h2 style="font-family:'Cinzel'; color:var(--dorado); margin-top:0; text-align:center;">Registro de Padrón</h2>
        <form id="formAlta">
            <div class="form-grid">
                <div class="full-width">
                    <label>Nombre Completo</label>
                    <input type="text" id="h_nombre" style="width:96%" required>
                </div>
                <div>
                    <label>Logia</label>
                    <select id="h_logia" style="width:100%" required></select>
                </div>
                <div>
                    <label>Grado Actual</label>
                    <select id="h_grado" style="width:100%">
                        <option value="1">Aprendiz</option>
                        <option value="2">Compañero</option>
                        <option value="3">Maestro Masón</option>
                    </select>
                </div>
                <div>
                    <label>Correo Electrónico</label>
                    <input type="email" id="h_correo" style="width:90%" required>
                </div>
                <div>
                    <label>Teléfono</label>
                    <input type="text" id="h_tel" style="width:90%">
                </div>
                <div class="full-width" style="margin-top:20px; text-align:right;">
                    <button type="button" onclick="cerrarModal()" style="background:none; color:white; border:1px solid; padding:10px 20px; cursor:pointer; margin-right:10px;">Cancelar</button>
                    <button type="submit" style="background:var(--verde); color:var(--azul); border:none; padding:10px 30px; font-weight:bold; cursor:pointer;">Guardar Hermano</button>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
    const CSV_MEMBRESIA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRHtXI5LY1DF7e6sHplXRgzQhk1yHaSZ7lKXUZvY2dTtkUKc29RvzZzCM6FffbYxoFWeIMst9ZKeP10/pub?gid=838211030&single=true&output=csv"; // Pestaña "Membresia"
    const CSV_LOGIAS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRHtXI5LY1DF7e6sHplXRgzQhk1yHaSZ7lKXUZvY2dTtkUKc29RvzZzCM6FffbYxoFWeIMst9ZKeP10/pub?gid=0&single=true&output=csv"; // Pestaña "Sheet1" donde están las logias
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwaveXszk1SZ83r0kZTYZjgrXIYvtC2gI_DBv42lYWiO-Q3qtWsklaNdaTgngb-fkwugA/exec";

    let todosLosHermanos = [];

    function init() {
        // 1. Cargar Logias para los selectores
        Papa.parse(CSV_LOGIAS, { download: true, header: true, complete: (r) => {
            const logias = r.data.filter(x => x.nombre_logia);
            const selectFiltro = document.getElementById('filtroLogia');
            const selectAlta = document.getElementById('h_logia');
            logias.forEach(l => {
                selectFiltro.add(new Option(l.nombre_logia, l.nombre_logia));
                selectAlta.add(new Option(l.nombre_logia, l.nombre_logia));
            });
        }});

        // 2. Cargar Padrón de Membresía
        Papa.parse(CSV_MEMBRESIA, { download: true, header: true, complete: (r) => {
            todosLosHermanos = r.data.filter(x => x.Nombre);
            renderTabla(todosLosHermanos);
        }});
    }

    function renderTabla(data) {
        const tbody = document.getElementById('padrónContent');
        tbody.innerHTML = '';
        data.forEach(h => {
            tbody.innerHTML += `
                <tr>
                    <td style="color:var(--dorado-osc); font-family:'Cinzel'; font-size:0.7rem;">${h.ID_QR || 'S/N'}</td>
                    <td><b>${h.Nombre}</b></td>
                    <td>${h.Logia}</td>
                    <td><span class="grado-tag">${h.Grado}°</span></td>
                    <td style="color:var(--verde); font-size:0.7rem;">● ACTIVO</td>
                    <td><button onclick="verFicha('${h.ID_QR}')" style="background:none; border:1px solid var(--dorado-osc); color:var(--dorado-osc); cursor:pointer; padding:3px 7px; border-radius:3px;">Ficha</button></td>
                </tr>`;
        });
    }

    function filtrarTabla() {
        const texto = document.getElementById('inputBuscar').value.toLowerCase();
        const logia = document.getElementById('filtroLogia').value;
        
        const filtrados = todosLosHermanos.filter(h => {
            const coincideNombre = h.Nombre.toLowerCase().includes(texto);
            const coincideLogia = logia === "" || h.Logia === logia;
            return coincideNombre && coincideLogia;
        });
        renderTabla(filtrados);
    }

    function abrirModal() { document.getElementById('modalAlta').style.display = 'flex'; }
    function cerrarModal() { document.getElementById('modalAlta').style.display = 'none'; }

    document.getElementById('formAlta').onsubmit = async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button[type="submit"]');
        btn.innerText = "Procesando...";
        btn.disabled = true;

        const nuevo = {
            accion: "ALTA_HERMANO",
            nombre: document.getElementById('h_nombre').value,
            logia: document.getElementById('h_logia').value,
            grado: document.getElementById('h_grado').value,
            correo: document.getElementById('h_correo').value,
            tel: document.getElementById('h_tel').value
        };

        try {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(nuevo) });
            alert("Hermano registrado con éxito.");
            location.reload();
        } catch (err) { alert("Error de conexión."); btn.disabled = false; }
    };

    window.onload = init;
</script>
</body>
</html>
