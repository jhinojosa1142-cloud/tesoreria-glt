<style>
    .punto-geometrico-container {
        background: var(--azul-tarjeta);
        border: 1px solid var(--dorado-oscuro);
        border-radius: 12px;
        padding: 30px;
        margin-top: 20px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    }

    .seccion-titulo {
        font-family: 'Cinzel', serif;
        color: var(--dorado);
        text-align: center;
        border-bottom: 1px solid rgba(197, 160, 89, 0.3);
        padding-bottom: 15px;
        margin-bottom: 25px;
        letter-spacing: 3px;
    }

    .mapa-marco {
        width: 100%;
        height: 400px;
        border-radius: 8px;
        border: 2px solid var(--dorado-oscuro);
        overflow: hidden;
        background: #000;
    }

    .info-ubicacion {
        margin-top: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
    }

    .detalles-txt {
        color: var(--blanco-suave);
        font-size: 1.1rem;
    }

    .detalles-txt i {
        color: var(--dorado);
        margin-right: 10px;
    }

    .btn-gps {
        background: transparent;
        border: 1px solid var(--dorado);
        color: var(--dorado);
        padding: 10px 20px;
        font-family: 'Cinzel';
        text-decoration: none;
        transition: 0.3s;
        border-radius: 4px;
    }

    .btn-gps:hover {
        background: var(--dorado);
        color: var(--azul-profundo);
    }
</style>

<div class="punto-geometrico-container">
    <h2 class="seccion-titulo">∴ Punto Geométrico ∴</h2>
    
    <div class="mapa-marco">
        <iframe 
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3693.351227091481!2d-97.87532742385102!3d22.245372079727494!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x85d7fad20e6ab9d3%3A0x0f3191d4d89053fa!2sGran%20Logia%20De%20Tamaulipas!5e0!3m2!1ses-419!2smx!4v1711234567890!5m2!1ses-419!2smx" 
            width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy">
        </iframe>
    </div>

    <div class="info-ubicacion">
        <div class="detalles-txt">
            <p><strong>Oriente:</strong> Tampico, Tamaulipas</p>
            <p><strong>Dirección:</strong> Calle Encino #100, Col. Águila</p>
        </div>
        <a href="https://maps.app.goo.gl/uXpXN6K3yNfK6XF88" target="_blank" class="btn-gps">
            ABRIR EN GOOGLE MAPS
        </a>
    </div>
</div>
