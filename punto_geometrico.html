<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punto Geométrico - GLT</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-profundo: #0a192f;
            --azul-tarjeta: #112240;
            --dorado: #f9e29b;
            --dorado-oscuro: #c5a059;
            --blanco-suave: #e6f1ff;
        }

        body {
            font-family: 'Lora', serif;
            background-color: var(--azul-profundo);
            color: var(--blanco-suave);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            padding: 40px 20px;
            text-align: center;
            border-bottom: 2px solid var(--dorado-oscuro);
            background: linear-gradient(rgba(0,0,0,0.4), rgba(10, 25, 47, 0.9));
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: var(--dorado);
            margin: 0;
            letter-spacing: 3px;
            font-size: 2rem;
            text-transform: uppercase;
        }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
            flex: 1;
        }

        /* Tarjeta de Ubicación Principal */
        .geo-card {
            background: var(--azul-tarjeta);
            border: 1px solid var(--dorado-oscuro);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Contenedor del Mapa */
        .map-wrapper {
            width: 100%;
            height: 450px;
            border-bottom: 2px solid var(--dorado-oscuro);
            filter: grayscale(20%) contrast(110%);
        }

        /* Información del Oriente */
        .geo-info {
            padding: 30px;
            background: linear-gradient(to bottom, var(--azul-tarjeta), #0d1b2a);
        }

        .logia-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(197, 160, 89, 0.2);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .logia-titulo {
            font-family: 'Cinzel', serif;
            color: var(--dorado);
            font-size: 1.4rem;
            margin: 0;
        }

        .logia-numero {
            font-family: 'Cinzel', serif;
            background: var(--dorado-oscuro);
            color: var(--azul-profundo);
            padding: 5px 12px;
            border-radius: 4px;
            font-weight: bold;
        }

        .detalles-lista {
            list-style: none;
            padding: 0;
            margin: 0 0 30px 0;
        }

        .detalles-lista li {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            font-size: 1rem;
        }

        .detalles-lista span {
            color: var(--dorado);
            margin-right: 15px;
            font-size: 1.2rem;
        }

        /* Botón de Acción */
        .btn-gps {
            display: block;
            text-align: center;
            background: transparent;
            border: 1px solid var(--dorado);
            color: var(--dorado);
            padding: 15px;
            font-family: 'Cinzel', serif;
            text-decoration: none;
            letter-spacing: 2px;
            font-weight: bold;
            transition: all 0.4s;
            text-transform: uppercase;
        }

        .btn-gps:hover {
            background: var(--dorado);
            color: var(--azul-profundo);
            box-shadow: 0 0 20px rgba(249, 226, 155, 0.4);
        }

        .btn-regresar {
            display: inline-block;
            margin-top: 30px;
            color: var(--dorado-oscuro);
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            transition: 0.3s;
        }

        .btn-regresar:hover { color: var(--dorado); }

        footer {
            text-align: center;
            padding: 40px;
            font-size: 0.8rem;
            color: var(--dorado-oscuro);
            border-top: 1px solid rgba(197, 160, 89, 0.1);
        }

        @media (max-width: 768px) {
            .map-wrapper { height: 300px; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <img src="logo_moderno.png" width="60" alt="Logo GLT" style="margin-bottom:15px; filter: drop-shadow(0 0 5px var(--dorado));">
        <h1>Punto Geométrico</h1>
    </header>

    <div class="container">
        
        <div class="geo-card">
            <div class="map-wrapper">
                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3694.067341054378!2d-97.86311682414777!3d22.21850124584281!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x85d8fa020e6ab9d3%3A0xfe3191d4d89053fa!2sGran%20Logia%20De%20Tamaulipas!5e0!3m2!1ses-419!2smx!4v1710000000000!5m2!1ses-419!2smx" 
                    width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>

            <div class="geo-info">
                <div class="logia-header">
                    <h2 class="logia-titulo">Muy Respetable Gran Logia de Tamaulipas</h2>
                    <span class="logia-numero">SEDE</span>
                </div>

                <ul class="detalles-lista">
                    <li><span>📍</span> Calle Encino #100, Col. Águila, CP 89230</li>
                    <li><span>🏙️</span> Oriente de Tampico, Tamaulipas</li>
                    <li><span>📞</span> Tel: (833) 212-2516</li>
                </ul>

                <a href="https://maps.app.goo.gl/9Z3S6xY" target="_blank" class="btn-gps">
                    Traza tu Ruta (GPS)
                </a>
            </div>
        </div>

        <center>
            <a href="index.html" class="btn-regresar">← REGRESAR AL PORTAL</a>
        </center>
    </div>

    <footer>
        <p>A.·. L.·. G.·. A.·. D.·. U.·.<br>&copy; 2026 Muy Respetable Gran Logia de Tamaulipas</p>
    </footer>

</body>
</html>
