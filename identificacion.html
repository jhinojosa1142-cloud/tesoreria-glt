<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | Archivum Digitalis</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --azul: #0a192f; --azul-l: #112240; --dorado: #f9e29b; --dorado-osc: #c5a059; --blanco: #e6f1ff; }
        body { font-family: 'Lora', serif; background: var(--azul); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: var(--blanco); overflow: hidden; }
        .login-box { width: 350px; padding: 40px; background: var(--azul-l); border: 2px solid var(--dorado-osc); border-radius: 15px; text-align: center; z-index: 10; }
        h1 { font-family: 'Cinzel'; font-size: 1.2rem; color: var(--dorado); letter-spacing: 2px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-family: 'Cinzel'; font-size: 0.7rem; color: var(--dorado-osc); margin-bottom: 5px; }
        input { width: 100%; padding: 12px; background: var(--azul); border: 1px solid var(--dorado-osc); color: white; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--dorado-osc); border: none; color: var(--azul); font-family: 'Cinzel'; font-weight: bold; cursor: pointer; border-radius: 5px; }
        #mensaje { margin-top: 20px; font-size: 0.8rem; font-weight: bold; }
        .error { color: #ff4d4d; } .success { color: #2ecc71; }
    </style>
</head>
<body>

<div class="login-box">
    <h1>PLATAFORMA HIRAM</h1>
    <p style="font-family:'Cinzel'; font-size:0.6rem; color:var(--dorado-osc);">GRAN LOGIA DE TAMAULIPAS</p>
    <form id="loginForm">
        <div class="input-group">
            <label>ID Masónico</label>
            <input type="text" id="usuario" placeholder="Ej: GL-12345" required>
        </div>
        <div class="input-group">
            <label>Contraseña (4 últimos del Tel)</label>
            <input type="password" id="password" placeholder="****" required>
        </div>
        <button type="submit" id="btnIngresar">INGRESAR</button>
    </form>
    <div id="mensaje"></div>
</div>

<script>
    const CSV_MEMBRESIA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRHtXI5LY1DF7e6sHplXRgzQhk1yHaSZ7lKXUZvY2dTtkUKc29RvzZzCM6FffbYxoFWeIMst9ZKeP10/pub?gid=838211030&single=true&output=csv";

    document.getElementById('loginForm').onsubmit = function(e) {
        e.preventDefault();
        const userIn = document.getElementById('usuario').value.trim();
        const passIn = document.getElementById('password').value.trim();
        const msg = document.getElementById('mensaje');

        Papa.parse(CSV_MEMBRESIA, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(results) {
                const hermano = results.data.find(h => (h.ID_Masonico || h.id_masonico || h.ID || h["ID Masónico"] || "").toString().trim() === userIn);
                
                if (hermano) {
                    const tel = (hermano.Telefono || hermano.telefono || hermano.Tel || "").toString().trim();
                    if (passIn === tel.slice(-4)) {
                        const rol = (hermano.Rol || hermano.rol || "Hermano").toString().trim();
                        sessionStorage.setItem("usuarioLogueado", userIn);
                        sessionStorage.setItem("rolUsuario", rol);
                        msg.className = "success"; msg.innerHTML = "Confirmado. Entrando...";
                        setTimeout(() => {
                            if (rol === "Secretario") window.location.href = "secretario.html";
                            else if (rol === "Tesorero") window.location.href = "tesorero.html";
                            else window.location.href = "pasaporte.html";
                        }, 1200);
                    } else { msg.className = "error"; msg.innerHTML = "Contraseña incorrecta."; }
                } else { msg.className = "error"; msg.innerHTML = "ID no encontrado."; }
            }
        });
    };
</script>
</body>
</html>
