<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | Archivum Digitalis</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { 
            --azul: #0a192f; --azul-l: #112240; --dorado: #f9e29b; 
            --dorado-osc: #c5a059; --blanco: #e6f1ff; 
        }

        body { 
            font-family: 'Lora', serif; background: var(--azul); 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; color: var(--blanco);
            background-image: radial-gradient(circle at center, #112240 0%, #0a192f 100%);
        }

        .login-box {
            width: 350px; padding: 40px; background: var(--azul-l);
            border: 2px solid var(--dorado-osc); border-radius: 15px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5); text-align: center;
        }

        .logo { width: 80px; margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--dorado-osc)); }

        h1 { font-family: 'Cinzel'; font-size: 1.2rem; color: var(--dorado); margin-bottom: 30px; letter-spacing: 2px; }

        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-family: 'Cinzel'; font-size: 0.7rem; color: var(--dorado-osc); margin-bottom: 5px; }
        
        input {
            width: 100%; padding: 12px; background: var(--azul); border: 1px solid var(--dorado-osc);
            color: white; border-radius: 5px; box-sizing: border-box; outline: none;
        }

        button {
            width: 100%; padding: 15px; background: var(--dorado-osc); border: none;
            color: var(--azul); font-family: 'Cinzel'; font-weight: bold;
            cursor: pointer; border-radius: 5px; transition: 0.3s; margin-top: 10px;
        }

        button:hover { background: var(--dorado); transform: translateY(-2px); }

        #mensaje { margin-top: 20px; font-size: 0.8rem; min-height: 1.2em; }
        .error { color: #ff4d4d; }
        .success { color: #2ecc71; }
    </style>
</head>
<body>

<div class="login-box">
    <img src="logo_moderno.png" alt="Logo" class="logo">
    <h1>PLATAFORMA HIRAM</h1>
    
    <form id="loginForm">
        <div class="input-group">
            <label>ID Masónico / Usuario</label>
            <input type="text" id="usuario" placeholder="Ej: GL-12345" required>
        </div>
        <div class="input-group">
            <label>Contraseña (Últimos 4 dígitos del Tel.)</label>
            <input type="password" id="password" placeholder="****" required>
        </div>
        <button type="submit" id="btnIngresar">INGRESAR AL TEMPLO</button>
    </form>
    
    <div id="mensaje"></div>
</div>

<script>
    // --- CONFIGURACIÓN ---
    const CSV_MEMBRESIA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRHtXI5LY1DF7e6sHplXRgzQhk1yHaSZ7lKXUZvY2dTtkUKc29RvzZzCM6FffbYxoFWeIMst9ZKeP10/pub?gid=838211030&single=true&output=csv";

    document.getElementById('loginForm').onsubmit = function(e) {
        e.preventDefault();
        const userIn = document.getElementById('usuario').value.trim();
        const passIn = document.getElementById('password').value.trim();
        const msg = document.getElementById('mensaje');
        const btn = document.getElementById('btnIngresar');

        msg.innerHTML = "Validando identidad...";
        btn.disabled = true;

        Papa.parse(CSV_MEMBRESIA, {
            download: true,
            header: true,
            complete: function(results) {
                const padron = results.data;
                
                // Buscamos al hermano por su ID Masónico
                const hermano = padron.find(h => {
                    const idPadron = (h.ID_Masonico || h.id_masonico || h.ID || h["ID Masónico"] || "").toString().trim();
                    return idPadron === userIn;
                });

                if (hermano) {
                    // VALIDACIÓN DE CONTRASEÑA (Usando los últimos 4 dígitos del teléfono registrado)
                    const telCompleto = (hermano.Telefono || hermano.telefono || hermano.Tel || "").toString().trim();
                    const ultimosCuatro = telCompleto.slice(-4);

                    if (passIn === ultimosCuatro) {
                        msg.className = "success";
                        msg.innerHTML = "Identidad confirmada. Bienvenido, V:. H:.";
                        
                        // --- PASO CLAVE ---
                        // Guardamos el ID en la sesión para que el Pasaporte lo lea automáticamente
                        sessionStorage.setItem("usuarioLogueado", userIn);
                        
                        // Redirigir al menú principal después de 1.5 segundos
                        setTimeout(() => {
                            window.location.href = "menu.html"; 
                        }, 1500);
                    } else {
                        msg.className = "error";
                        msg.innerHTML = "Contraseña incorrecta.";
                        btn.disabled = false;
                    }
                } else {
                    msg.className = "error";
                    msg.innerHTML = "ID Masónico no encontrado en el Padrón.";
                    btn.disabled = false;
                }
            },
            error: function() {
                msg.className = "error";
                msg.innerHTML = "Error al conectar con el Archivum.";
                btn.disabled = false;
            }
        });
    };
</script>

</body>
</html>
