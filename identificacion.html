<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Validación de Credencial - Plataforma Hiram</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora&display=swap" rel="stylesheet">
    <style>
        :root { --azul: #0a192f; --dorado: #f9e29b; --blanco: #e6f1ff; }
        body { background: var(--azul); color: var(--blanco); font-family: 'Lora', serif; display: flex; justify-content: center; padding: 50px 20px; }
        .container { max-width: 400px; width: 100%; text-align: center; }
        input { padding: 12px; width: 80%; border-radius: 5px; border: 1px solid var(--dorado); background: transparent; color: white; margin-bottom: 20px; }
        button { padding: 12px 25px; background: var(--dorado); color: var(--azul); border: none; font-family: 'Cinzel'; font-weight: bold; cursor: pointer; border-radius: 5px; }
        
        /* Estilo de la Credencial Resultado */
        #resultado { margin-top: 30px; display: none; }
        .card { border: 2px solid var(--dorado); padding: 20px; border-radius: 15px; background: #112240; position: relative; overflow: hidden; }
        .card h2 { font-family: 'Cinzel'; color: var(--dorado); font-size: 1.2rem; }
        .status-badge { background: #27ae60; color: white; padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="font-family: 'Cinzel'; color: var(--dorado);">Identificación</h1>
    <p>Ingrese su número de ID para generar su credencial digital.</p>
    
    <input type="text" id="idHermano" placeholder="Ej: 12345">
    <br>
    <button onclick="buscarHermano()">Validar Identidad</button>

    <div id="resultado">
        <div class="card" id="cardContent">
            </div>
    </div>
</div>

<script>
    async function buscarHermano() {
        const id = document.getElementById('idHermano').value;
        const btn = document.querySelector('button');
        const resDiv = document.getElementById('resultado');
        const card = document.getElementById('cardContent');

        if(!id) return alert("Por favor ingrese un ID");

        btn.innerText = "Buscando...";
        
        // REEMPLAZA ESTA URL con la que copiaste de Google Apps Script
        const URL_SCRIPT = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRHtXI5LY1DF7e6sHplXRgzQhk1yHaSZ7lKXUZvY2dTtkUKc29RvzZzCM6FffbYxoFWeIMst9ZKeP10/pub?gid=1959209005&single=true&output=csv";

        try {
            const response = await fetch(`${URL_SCRIPT}?id=${id}`);
            const data = await response.json();

            if(data.encontrado) {
                resDiv.style.display = "block";
                card.innerHTML = `
                    <div class="status-badge">ACTIVO</div>
                    <h2 id="nombreRes">${data.nombre}</h2>
                    <p style="color: var(--dorado)">${data.grado}</p>
                    <hr style="border: 0; border-top: 1px solid rgba(249,226,155,0.3)">
                    <p style="font-size: 0.9rem;">${data.logia}</p>
                    <p style="font-size: 0.7rem; opacity: 0.6; margin-top: 20px;">ID VERIFICADO: ${id}</p>
                `;
            } else {
                alert("Hermano no encontrado. Verifique su ID o contacte a Secretaría.");
                resDiv.style.display = "none";
            }
        } catch (error) {
            console.error(error);
            alert("Error de conexión con la base de datos.");
        } finally {
            btn.innerText = "Validar Identidad";
        }
    }
</script>

</body>
</html>
