<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identificación | Plataforma Hiram</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --azul: #0a192f; --tarjeta: #112240; --dorado: #f9e29b; --dorado-osc: #c5a059; --blanco: #e6f1ff; }
        body { font-family: 'Lora', serif; background: var(--azul); color: var(--blanco); margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .login-card { background: var(--tarjeta); border: 1px solid var(--dorado-osc); border-radius: 15px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); text-align: center; }
        .logo { width: 80px; margin-bottom: 10px; filter: drop-shadow(0 0 5px var(--dorado)); }
        h2 { font-family: 'Cinzel'; color: var(--dorado); margin-bottom: 25px; font-size: 1.3rem; }
        .form-group { text-align: left; margin-bottom: 20px; }
        label { font-family: 'Cinzel'; font-size: 0.7rem; color: var(--dorado-osc); display: block; margin-bottom: 8px; }
        input { width: 100%; padding: 12px; background: rgba(10, 25, 47, 0.7); border: 1px solid var(--dorado-osc); border-radius: 5px; color: white; box-sizing: border-box; outline: none; }
        .btn-validar { width: 100%; padding: 15px; background: var(--dorado-osc); color: var(--azul); border: none; border-radius: 5px; font-family: 'Cinzel'; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-validar:hover { background: var(--dorado); transform: scale(1.02); }
        #error-msg { color: #ff4d4d; font-size: 0.8rem; margin-top: 15px; display: none; }
        .loading { display: none; color: var(--dorado); font-size: 0.8rem; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="logo_moderno.png" class="logo">
        <h2>IDENTIFICACIÓN</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Nombre Completo (Sin acentos)</label>
                <input type="text" id="nombreInput" placeholder="EJ: JUAN PEREZ" required>
            </div>
            <div class="form-group">
                <label>Número de Afiliación</label>
                <input type="text" id="idInput" placeholder="ID UNICO" required>
            </div>
            <button type="submit" class="btn-validar" id="btnSubmit">VERIFICAR</button>
        </form>
        <div id="loading" class="loading">Consultando censo...</div>
        <div id="error-msg">✕ Datos no encontrados. Reintente.</div>
    </div>

    <script>
        // PEGA AQUÍ TU LINK DE PUBLICACIÓN CSV DE GOOGLE SHEETS
        const SHEET_CSV_URL = "TU_URL_DE_GOOGLE_SHEET_CSV_AQUI";

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const nom = document.getElementById('nombreInput').value.trim().toUpperCase();
            const id = document.getElementById('idInput').value.trim();
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('error-msg').style.display = 'none';

            Papa.parse(SHEET_CSV_URL, {
                download: true, header: true, skipEmptyLines: true,
                complete: function(results) {
                    document.getElementById('loading').style.display = 'none';
                    // Buscamos coincidencia en columnas nombre_completo y numero_afiliacion
                    const h = results.data.find(r => 
                        r.nombre_completo && r.nombre_completo.toUpperCase().trim() === nom && 
                        r.numero_afiliacion && r.numero_afiliacion.toString().trim() === id
                    );

                    if (h) {
                        sessionStorage.setItem('hermanoValidado', JSON.stringify(h));
                        window.location.href = "pasaporte.html";
                    } else {
                        document.getElementById('error-msg').style.display = 'block';
                    }
                }
            });
        });
    </script>
</body>
</html>
