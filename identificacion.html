<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identificación Masónica | Plataforma Hiram</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <style>
        :root {
            --azul-profundo: #0a192f;
            --azul-tarjeta: #112240;
            --dorado: #f9e29b;
            --dorado-oscuro: #c5a059;
            --blanco: #e6f1ff;
            --rojo: #ff4d4d;
        }

        body {
            font-family: 'Lora', serif;
            background-color: var(--azul-profundo);
            color: var(--blanco);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            background: var(--azul-tarjeta);
            border: 1px solid var(--dorado-oscuro);
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        .logo-small { width: 70px; margin-bottom: 20px; filter: drop-shadow(0 0 5px var(--dorado)); }
        
        h2 { font-family: 'Cinzel'; color: var(--dorado); margin-bottom: 30px; font-size: 1.2rem; }

        .form-group { text-align: left; margin-bottom: 20px; }
        label { font-family: 'Cinzel'; font-size: 0.7rem; color: var(--dorado-oscuro); display: block; margin-bottom: 8px; }
        
        input {
            width: 100%; padding: 12px; background: rgba(10, 25, 47, 0.7);
            border: 1px solid var(--dorado-oscuro); border-radius: 5px;
            color: white; font-family: 'Lora'; box-sizing: border-box; outline: none;
        }

        input:focus { border-color: var(--dorado); box-shadow: 0 0 10px rgba(249, 226, 155, 0.2); }

        .btn-validar {
            width: 100%; padding: 15px; background: var(--dorado-oscuro);
            color: var(--azul-profundo); border: none; border-radius: 5px;
            font-family: 'Cinzel'; font-weight: bold; cursor: pointer; transition: 0.3s;
            margin-top: 10px;
        }

        .btn-validar:hover { background: var(--dorado); transform: scale(1.02); }

        #error-msg { color: var(--rojo); font-size: 0.8rem; margin-top: 15px; display: none; }
        
        .loading-spinner { display: none; margin-top: 15px; color: var(--dorado); font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="logo_moderno.png" class="logo-small">
        <h2>IDENTIFICACIÓN DE HERMANO</h2>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Nombre Completo (Sin acentos)</label>
                <input type="text" id="nombreInput" placeholder="EJ: JUAN PEREZ" required autocomplete="off">
            </div>
            
            <div class="form-group">
                <label>Número de Afiliación</label>
                <input type="text" id="idInput" placeholder="ID UNICO" required autocomplete="off">
            </div>

            <button type="submit" class="btn-validar" id="btnSubmit">VERIFICAR EN CENSO</button>
        </form>

        <div id="loading" class="loading-spinner">Consultando archivos de la Gran Logia...</div>
        <div id="error-msg">✕ Datos no encontrados. Verifique su información.</div>
        
        <a href="index.html" style="color: var(--dorado-oscuro); text-decoration: none; font-size: 0.7rem; display: block; margin-top: 30px; font-family: 'Cinzel';">← VOLVER AL INICIO</a>
    </div>

    <script>
        // --- CONFIGURACIÓN ---
        // 1. En tu Google Sheet ve a Archivo > Compartir > Publicar en la Web.
        // 2. Selecciona "Valores separados por comas (.csv)".
        // 3. Pega el enlace generado aquí abajo:
        const SHEET_CSV_URL = "TU_URL_DE_GOOGLE_SHEET_CSV_AQUI";

        const loginForm = document.getElementById('loginForm');
        const errorMsg = document.getElementById('error-msg');
        const loading = document.getElementById('loading');
        const btnSubmit = document.getElementById('btnSubmit');

        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const nombreBusqueda = document.getElementById('nombreInput').value.trim().toUpperCase();
            const idBusqueda = document.getElementById('idInput').value.trim();

            errorMsg.style.display = 'none';
            loading.style.display = 'block';
            btnSubmit.disabled = true;

            Papa.parse(SHEET_CSV_URL, {
                download: true,
                header: true,
                complete: function(results) {
                    loading.style.display = 'none';
                    btnSubmit.disabled = false;
                    
                    // Buscamos coincidencia. Asegúrate que las columnas en tu Sheet se llamen exactamente así:
                    // "nombre_completo" y "numero_afiliacion"
                    const hermano = results.data.find(row => 
                        row.nombre_completo.toUpperCase() === nombreBusqueda && 
                        row.numero_afiliacion === idBusqueda
                    );

                    if (hermano) {
                        // Guardamos los datos en la sesión para que pasaporte.html los lea
                        sessionStorage.setItem('hermanoValidado', JSON.stringify(hermano));
                        // Redirigimos al pasaporte
                        window.location.href = "pasaporte.html";
                    } else {
                        errorMsg.style.display = 'block';
                    }
                },
                error: function() {
                    loading.style.display = 'none';
                    btnSubmit.disabled = false;
                    alert("Error al conectar con la base de datos de Google Sheets.");
                }
            });
        });
    </script>

</body>
</html>
