<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | Archivum Digitalis</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { 
            --azul: #0a192f; --azul-l: #112240; --dorado: #f9e29b; 
            --dorado-osc: #c5a059; --blanco: #e6f1ff; 
        }

        body { 
            font-family: 'Lora', serif; background: var(--azul); 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; color: var(--blanco);
            background-image: radial-gradient(circle at center, #112240 0%, #0a192f 100%);
        }

        .login-box {
            width: 350px; padding: 40px; background: var(--azul-l);
            border: 2px solid var(--dorado-osc); border-radius: 15px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5); text-align: center;
        }

        .logo { width: 80px; margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--dorado-osc)); }

        h1 { font-family: 'Cinzel'; font-size: 1.2rem; color: var(--dorado); margin-bottom: 10px; letter-spacing: 2px; }
        p.subtitle { font-family: 'Cinzel'; font-size: 0.6rem; color: var(--dorado-osc); margin-bottom: 30px; letter-spacing: 1px; }

        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-family: 'Cinzel'; font-size: 0.7rem; color: var(--dorado-osc); margin-bottom: 5px; }
        
        input {
            width: 100%; padding: 12px; background: var(--azul); border: 1px solid var(--dorado-osc);
            color: white; border-radius: 5px; box-sizing: border-box; outline: none; font-size: 1rem;
        }

        button {
            width: 100%; padding: 15px; background: var(--dorado-osc); border: none;
            color: var(--azul); font-family: 'Cinzel'; font-weight: bold;
            cursor: pointer; border-radius: 5px; transition: 0.3s; margin-top: 10px;
        }

        button:hover { background: var(--dorado); transform: translateY(-2px); }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }

        #mensaje { margin-top: 20px; font-size: 0.8rem; min-height: 1.2em; font-weight: bold; }
        .error { color: #ff4d4d; }
        .success { color: #2ecc71; }
    </style>
</head>
<body>

<div class="login-box">
    <img src="logo_moderno.png" alt="Gran Logia" class="logo" onerror="this.style.display='none'">
    <h1>PLATAFORMA HIRAM</h1>
    <p class="subtitle">ARCHIVUM DIGITALIS TAMAULIPAS</p>
    
    <form id="loginForm">
        <div class="input-group">
            <label>ID Masónico / Usuario</label>
            <input type="text" id="usuario" placeholder="Ej: GL-12345" required autocomplete="username">
        </div>
        <div class="input-group">
            <label>Contraseña (Últimos 4 dígitos del Tel.)</label>
            <input type="password" id="password" placeholder="****" required autocomplete="current-password">
        </div>
        <button type="submit" id="btnIngresar">INGRESAR AL TEMPLO</button>
    </form>
    
    <div id="mensaje"></div>
</div>

<script>
    // --- CONFIGURACIÓN ---
    // Asegúrate de que esta URL sea la de tu CSV de la hoja "Membresia"
    const CSV_MEMBRESIA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRHtXI5LY1DF7e6sHplXRgzQhk1yHaSZ7lKXUZvY2dTtkUKc29RvzZzCM6FffbYxoFWeIMst9ZKeP10/pub?gid=838211030&single=true&output=csv";

    document.getElementById('loginForm').onsubmit = function(e) {
        e.preventDefault();
        const userIn = document.getElementById('usuario').value.trim();
        const passIn = document.getElementById('password').value.trim();
        const msg = document.getElementById('mensaje');
        const btn = document.getElementById('btnIngresar');

        msg.className = "";
        msg.innerHTML = "Consultando el Padrón...";
        btn.disabled = true;

        Papa.parse(CSV_MEMBRESIA, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                const padron = results.data;
                
                // 1. Buscar al hermano (Mapeo Universal de columnas)
                const hermano = padron.find(h => {
                    const idCol = (h.ID_Masonico || h.id_masonico || h.ID || h["ID Masónico"] || "").toString().trim();
                    return idCol === userIn;
                });

                if (hermano) {
                    // 2. Extraer teléfono para la contraseña
                    const tel = (hermano.Telefono || hermano.telefono || hermano.Tel || "").toString().trim();
                    const ultimosCuatro = tel.slice(-4);

                    if (passIn === ultimosCuatro && ultimosCuatro !== "") {
                        // 3. Extraer el ROL del usuario
                        const rol = (hermano.Rol || hermano.rol || hermano.ROL || "Hermano").toString().trim();
                        
                        msg.className = "success";
                        msg.innerHTML = "Identidad confirmada. Perfil: " + rol.toUpperCase();
                        
                        // 4. Guardar datos en la sesión del navegador
                        sessionStorage.setItem("usuarioLogueado", userIn);
                        sessionStorage.setItem("rolUsuario", rol);

                        // 5. Redirección Inteligente
                        setTimeout(() => {
                            if (rol === "Secretario") {
                                window.location.href = "secretario.html";
                            } 
                            else if (rol === "Tesorero") {
                                window.location.href = "tesorero.html";
                            } 
                            else {
                                // Redirige al Pasaporte Digital por defecto
                                window.location.href = "pasaporte.html";
                            }
                        }, 1200);

                    } else {
                        msg.className = "error";
                        msg.innerHTML = "Contraseña incorrecta.";
                        btn.disabled = false;
                    }
                } else {
                    msg.className = "error";
                    msg.innerHTML = "ID Masónico no registrado.";
                    btn.disabled = false;
                }
            },
            error: function() {
                msg.className = "error";
                msg.innerHTML = "Error crítico de conexión.";
                btn.disabled = false;
            }
        });
    };
</script>

</body>
</html>
