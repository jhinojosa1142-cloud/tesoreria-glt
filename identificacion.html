<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | Plataforma Hiram</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { 
            --azul: #0a192f; 
            --tarjeta: #112240; 
            --dorado: #f9e29b; 
            --dorado-osc: #c5a059; 
            --blanco: #e6f1ff; 
        }

        body { 
            font-family: 'Lora', serif; 
            background: var(--azul); 
            color: var(--blanco); 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 20px; 
            background-image: radial-gradient(circle at center, #112240 0%, #0a192f 100%);
        }
        
        .login-card { 
            background: var(--tarjeta); 
            border: 1px solid var(--dorado-osc); 
            border-radius: 15px; 
            padding: 40px; 
            width: 100%; 
            max-width: 400px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); 
            text-align: center; 
        }

        .logo { width: 70px; margin-bottom: 10px; filter: drop-shadow(0 0 5px var(--dorado)); }
        h2 { font-family: 'Cinzel'; color: var(--dorado); margin-bottom: 25px; font-size: 1.3rem; letter-spacing: 2px; }
        .form-group { text-align: left; margin-bottom: 18px; }
        label { font-family: 'Cinzel'; font-size: 0.65rem; color: var(--dorado-osc); display: block; margin-bottom: 6px; }
        input { width: 100%; padding: 12px; background: rgba(10, 25, 47, 0.8); border: 1px solid var(--dorado-osc); border-radius: 6px; color: white; box-sizing: border-box; outline: none; }
        
        .btn-validar { width: 100%; padding: 14px; background: var(--dorado-osc); color: var(--azul); border: none; border-radius: 6px; font-family: 'Cinzel'; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 5px; }
        .btn-validar:hover { background: var(--dorado); transform: translateY(-2px); }

        .registro-footer { margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(197, 160, 89, 0.2); }
        .btn-registro { display: block; width: 100%; padding: 10px; border: 1px solid var(--dorado-osc); color: var(--dorado-osc); border-radius: 6px; text-decoration: none; font-family: 'Cinzel'; font-size: 0.65rem; transition: 0.3s; box-sizing: border-box; }

        #error-msg { color: #ff6b6b; font-size: 0.75rem; margin-top: 15px; display: none; }
        .loading { display: none; color: var(--dorado); font-size: 0.75rem; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="logo_moderno.png" class="logo">
        <h2>PLATAFORMA HIRAM</h2>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Nombre Completo</label>
                <input type="text" id="nombreInput" placeholder="EJ: JUAN PEREZ" required>
            </div>
            <div class="form-group">
                <label>Número de Afiliación / Clave</label>
                <input type="password" id="idInput" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-validar">INICIAR SESIÓN</button>
        </form>

        <div id="loading" class="loading">Validando Credenciales...</div>
        <div id="error-msg">✕ Datos incorrectos o sin permisos.</div>

        <div class="registro-footer">
            <a href="LINK_DE_REGISTRO" target="_blank" class="btn-registro">SOLICITAR REGISTRO</a>
        </div>
    </div>

    <script>
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRHtXI5LY1DF7e6sHplXRgzQhk1yHaSZ7lKXUZvY2dTtkUKc29RvzZzCM6FffbYxoFWeIMst9ZKeP10/pub?gid=1959209005&single=true&output=csv";

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const nom = document.getElementById('nombreInput').value.trim().toUpperCase();
            const id = document.getElementById('idInput').value.trim();
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('error-msg').style.display = 'none';

            Papa.parse(SHEET_CSV_URL, {
                download: true, 
                header: true, 
                complete: function(results) {
                    document.getElementById('loading').style.display = 'none';
                    
                    const user = results.data.find(r => 
                        r.nombre_completo && r.nombre_completo.toUpperCase().trim() === nom && 
                        r.numero_afiliacion && r.numero_afiliacion.toString().trim() === id
                    );

                    if (user) {
                        sessionStorage.setItem('hermanoValidado', JSON.stringify(user));
                        
                        // --- LÓGICA DE ENRUTAMIENTO POR ROL ---
                        const rol = (user.rol || "HERMANO").toUpperCase();

                        if (rol === "TESORERO") {
                            window.location.href = "tesorero.html";
                        } 
                        else if (rol === "SECRETARIO") {
                            window.location.href = "secretaria.html";
                        } 
                        else {
                            window.location.href = "pasaporte.html";
                        }
                    } else {
                        document.getElementById('error-msg').style.display = 'block';
                    }
                }
            });
        });
    </script>
</body>
</html>
