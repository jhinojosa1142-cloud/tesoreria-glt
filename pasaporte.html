<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasaporte Digital | GLT</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --azul: #0a192f; --tarjeta: #112240; --dorado: #f9e29b; --dorado-osc: #c5a059; --blanco: #e6f1ff; --verde: #2ecc71; }
        body { font-family: 'Lora', serif; background: var(--azul); color: var(--blanco); margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        
        .credencial { width: 100%; max-width: 340px; background: linear-gradient(135deg, #112240 0%, #0a192f 100%); border: 2px solid var(--dorado-osc); border-radius: 20px; padding: 25px; box-shadow: 0 20px 60px rgba(0,0,0,0.8); text-align: center; position: relative; }
        
        .header { border-bottom: 1px solid rgba(197, 160, 89, 0.3); padding-bottom: 10px; margin-bottom: 15px; }
        .logo-glt { width: 50px; filter: drop-shadow(0 0 5px var(--dorado)); }
        h2 { font-family: 'Cinzel'; font-size: 0.75rem; color: var(--dorado); margin: 5px 0 0; letter-spacing: 1px; }

        /* SECCIÓN FOTO */
        .foto-wrap { width: 120px; height: 120px; margin: 10px auto; border-radius: 50%; border: 3px solid var(--dorado-osc); overflow: hidden; background: var(--azul); display: flex; align-items: center; justify-content: center; }
        .foto-img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .no-foto { font-size: 3.5rem; color: var(--dorado-osc); opacity: 0.5; }

        .nombre { font-family: 'Cinzel'; font-size: 1.1rem; color: white; margin: 10px 0 2px; text-transform: uppercase; }
        .logia { font-size: 0.75rem; color: var(--dorado-osc); margin-bottom: 10px; }
        
        #qrcode { background: white; padding: 10px; display: inline-block; border-radius: 10px; border: 2px solid var(--dorado-osc); margin: 10px 0; }
        #qrcode img { width: 110px !important; height: 110px !important; }

        .status { background: rgba(46, 204, 113, 0.1); color: var(--verde); border: 1px solid var(--verde); padding: 4px 12px; border-radius: 50px; font-family: 'Cinzel'; font-size: 0.6rem; font-weight: bold; }
        
        .btn { width: 100%; max-width: 340px; padding: 14px; margin-top: 15px; border-radius: 8px; text-decoration: none; font-family: 'Cinzel'; font-size: 0.7rem; font-weight: bold; text-align: center; cursor: pointer; display: block; box-sizing: border-box; }
        .btn-print { background: var(--dorado-osc); color: var(--azul); border: none; }
        .btn-out { color: var(--dorado-osc); border: 1px solid var(--dorado-osc); margin-top: 10px; }
    </style>
</head>
<body>
    <div class="credencial">
        <div class="header">
            <img src="logo_moderno.png" class="logo-glt">
            <h2>MUY RESPETABLE GRAN LOGIA DE TAMAULIPAS</h2>
        </div>
        <div class="foto-wrap">
            <img src="" id="foto" class="foto-img">
            <div id="icon" class="no-foto">👤</div>
        </div>
        <div class="nombre" id="nom">CARGANDO...</div>
        <div class="logia" id="log">---</div>
        <div id="qrcode"></div>
        <div class="status">EN APLOMO 2026</div>
    </div>

    <a onclick="window.print()" class="btn btn-print">📥 GUARDAR CREDENCIAL</a>
    <a href="index.html" onclick="sessionStorage.clear()" class="btn btn-out">CERRAR SESIÓN</a>

    <script>
        window.onload = function() {
            const data = JSON.parse(sessionStorage.getItem('hermanoValidado'));
            if (!data) { window.location.href = "identificacion.html"; return; }

            document.getElementById('nom').innerText = data.nombre_completo;
            document.getElementById('log').innerText = `${data.logia_nombre} #${data.numero_logia}`;

            // Lógica para la foto de PostImg
            if (data.url_fotografia && data.url_fotografia.trim() !== "") {
                const img = document.getElementById('foto');
                img.src = data.url_fotografia.trim();
                img.style.display = 'block';
                document.getElementById('icon').style.display = 'none';
                img.onerror = function() {
                    img.style.display = 'none';
                    document.getElementById('icon').style.display = 'block';
                };
            }

            // Generar QR
            new QRCode(document.getElementById("qrcode"), {
                text: `VALID:${data.numero_afiliacion}|${data.nombre_completo}`,
                width: 110, height: 110, colorDark : "#0a192f", colorLight : "#ffffff"
            });
        };
    </script>
</body>
</html>
