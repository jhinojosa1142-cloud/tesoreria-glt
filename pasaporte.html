<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasaporte Digital | Gran Logia de Tamaulipas</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root {
            --azul-profundo: #0a192f;
            --azul-tarjeta: #112240;
            --dorado: #f9e29b;
            --dorado-oscuro: #c5a059;
            --blanco: #e6f1ff;
            --verde-aplomo: #2ecc71;
        }

        body {
            font-family: 'Lora', serif;
            background-color: var(--azul-profundo);
            color: var(--blanco);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            background-image: radial-gradient(circle at center, #112240 0%, #0a192f 100%);
        }

        /* --- CONTENEDOR DE LA CREDENCIAL --- */
        .credencial {
            width: 100%;
            max-width: 350px;
            background: linear-gradient(135deg, #112240 0%, #0a192f 100%);
            border: 2px solid var(--dorado-oscuro);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Marca de agua decorativa */
        .credencial::after {
            content: "🏛️";
            position: absolute;
            bottom: -20px;
            right: -20px;
            font-size: 10rem;
            opacity: 0.03;
            pointer-events: none;
        }

        .header-credencial {
            border-bottom: 1px solid rgba(197, 160, 89, 0.3);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .header-credencial img { width: 60px; filter: drop-shadow(0 0 5px var(--dorado)); }
        .header-credencial h2 { 
            font-family: 'Cinzel'; 
            font-size: 0.85rem; 
            color: var(--dorado); 
            margin: 10px 0 0;
            letter-spacing: 1px;
        }

        .nombre-hermano { 
            font-family: 'Cinzel'; 
            font-size: 1.3rem; 
            color: white; 
            margin: 10px 0 5px; 
            text-transform: uppercase;
        }

        .datos-hermano { 
            font-size: 0.8rem; 
            color: var(--dorado-oscuro); 
            margin-bottom: 15px; 
            letter-spacing: 1px;
        }

        /* Contenedor del QR */
        #qrcode {
            background: white;
            padding: 15px;
            display: inline-block;
            border-radius: 12px;
            margin: 15px 0;
            border: 3px solid var(--dorado-oscuro);
        }

        .badge-status {
            background: rgba(46, 204, 113, 0.1);
            color: var(--verde-aplomo);
            border: 1px solid var(--verde-aplomo);
            padding: 6px 15px;
            border-radius: 50px;
            font-family: 'Cinzel';
            font-size: 0.7rem;
            font-weight: bold;
            display: inline-block;
            margin-top: 10px;
        }

        /* --- BOTONES DE ACCIÓN --- */
        .acciones {
            margin-top: 30px;
            width: 100%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-action {
            padding: 14px;
            border-radius: 8px;
            text-decoration: none;
            font-family: 'Cinzel';
            font-size: 0.75rem;
            font-weight: bold;
            text-align: center;
            transition: 0.3s;
            cursor: pointer;
        }

        .btn-descargar {
            background: var(--dorado-oscuro);
            color: var(--azul-profundo);
            border: none;
        }

        .btn-descargar:hover { background: var(--dorado); transform: translateY(-2px); }

        .btn-salir {
            color: var(--dorado-oscuro);
            border: 1px solid var(--dorado-oscuro);
        }

        .btn-salir:hover { background: rgba(197, 160, 89, 0.1); }

        @media (max-width: 400px) {
            .credencial { padding: 15px; }
            .nombre-hermano { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div class="credencial" id="credencial-virtual">
        <div class="header-credencial">
            <img src="logo_moderno.png" alt="Logo GLT">
            <h2>MUY RESPETABLE GRAN LOGIA<br>DE TAMAULIPAS</h2>
        </div>

        <div class="nombre-hermano" id="disp-nombre">CARGANDO...</div>
        <div class="datos-hermano" id="disp-logia">---</div>

        <div id="qrcode"></div>

        <div>
            <div class="badge-status">ESTADO: EN APLOMO 2026</div>
        </div>

        <div style="margin-top: 20px; font-size: 0.5rem; color: var(--dorado-oscuro); letter-spacing: 2px;">
            S.·. F.·. U.·.
        </div>
    </div>

    <div class="acciones">
        <a href="javascript:void(0)" class="btn-action btn-descargar" onclick="window.print()">
            📥 DESCARGAR / IMPRIMIR CREDENCIAL
        </a>
        <a href="index.html" class="btn-action btn-salir" onclick="sessionStorage.clear()">
            CERRAR SESIÓN SEGURA
        </a>
    </div>

    <script>
        window.onload = function() {
            // 1. Recuperamos los datos del sessionStorage
            const data = JSON.parse(sessionStorage.getItem('hermanoValidado'));

            // 2. Seguridad: Si no hay datos, lo regresamos al login
            if (!data) {
                window.location.href = "identificacion.html";
                return;
            }

            // 3. Llenamos los campos de la tarjeta
            // Nota: Usa los nombres exactos de tus columnas del Google Sheet
            document.getElementById('disp-nombre').innerText = data.nombre_completo;
            document.getElementById('disp-logia').innerText = data.logia_nombre + " #" + data.numero_logia;

            // 4. Generamos el Código QR
            // El contenido del QR es un resumen de validación
            const contenidoQR = `GLT-VALID: ${data.numero_afiliacion} | ${data.nombre_completo} | LOGIA: ${data.numero_logia}`;
            
            new QRCode(document.getElementById("qrcode"), {
                text: contenidoQR,
                width: 150,
                height: 150,
                colorDark : "#0a192f",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        };
    </script>
</body>
</html>
