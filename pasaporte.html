<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasaporte Digital | Gran Logia de Tamaulipas</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Hiram App">
    <link rel="apple-touch-icon" href="logo_moderno.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root {
            --azul-profundo: #0a192f;
            --azul-tarjeta: #112240;
            --dorado: #f9e29b;
            --dorado-oscuro: #c5a059;
            --blanco: #e6f1ff;
            --verde-aplomo: #2ecc71;
        }

        body {
            font-family: 'Lora', serif;
            background-color: var(--azul-profundo);
            color: var(--blanco);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            background-image: radial-gradient(circle at center, #112240 0%, #0a192f 100%);
        }

        /* --- CREDENCIAL --- */
        .credencial {
            width: 100%;
            max-width: 340px;
            background: linear-gradient(135deg, #112240 0%, #0a192f 100%);
            border: 2px solid var(--dorado-oscuro);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header {
            border-bottom: 1px solid rgba(197, 160, 89, 0.3);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .logo-glt { width: 55px; filter: drop-shadow(0 0 5px var(--dorado)); }
        
        h2 { 
            font-family: 'Cinzel'; 
            font-size: 0.75rem; 
            color: var(--dorado); 
            margin: 8px 0 0;
            letter-spacing: 1px;
            line-height: 1.2;
        }

        /* --- FOTOGRAFÍA --- */
        .foto-wrap {
            width: 110px;
            height: 110px;
            margin: 10px auto;
            border-radius: 50%;
            border: 3px solid var(--dorado-oscuro);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            overflow: hidden;
            background-color: var(--azul-profundo);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .foto-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .no-foto-icon {
            font-size: 3.5rem;
            color: var(--dorado-oscuro);
            opacity: 0.5;
        }

        .nombre-hermano { 
            font-family: 'Cinzel'; 
            font-size: 1.15rem; 
            color: white; 
            margin: 10px 0 2px; 
            text-transform: uppercase;
        }

        .grado-hermano {
            font-family: 'Cinzel';
            font-size: 0.85rem;
            color: var(--dorado);
            font-weight: bold;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .logia-hermano { 
            font-size: 0.75rem; 
            color: var(--dorado-oscuro); 
            margin-bottom: 10px; 
            letter-spacing: 1px;
        }

        #qrcode {
            background: white;
            padding: 10px;
            display: inline-block;
            border-radius: 10px;
            margin: 10px 0;
            border: 2px solid var(--dorado-oscuro);
        }

        .badge-status {
            background: rgba(46, 204, 113, 0.1);
            color: var(--verde-aplomo);
            border: 1px solid var(--verde-aplomo);
            padding: 5px 15px;
            border-radius: 50px;
            font-family: 'Cinzel';
            font-size: 0.6rem;
            font-weight: bold;
            display: inline-block;
        }

        /* --- ESTILOS WALLET --- */
        .wallet-container {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid rgba(197, 160, 89, 0.1);
        }

        .wallet-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 5px;
        }

        .btn-wallet {
            height: 35px;
            transition: transform 0.2s;
            cursor: pointer;
        }

        .btn-wallet:hover { transform: scale(1.05); }

        .wallet-note {
            font-size: 0.55rem;
            color: var(--dorado-oscuro);
            margin-top: 8px;
            opacity: 0.7;
            font-style: italic;
        }

        /* --- BOTONES DE ACCIÓN --- */
        .acciones { margin-top: 25px; width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 12px; }
        
        .btn-action { 
            padding: 14px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-family: 'Cinzel'; 
            font-size: 0.75rem; 
            font-weight: bold; 
            text-align: center; 
            transition: 0.3s; 
            cursor: pointer; 
        }

        .btn-descargar { background: var(--dorado-oscuro); color: var(--azul-profundo); border: none; }
        .btn-descargar:hover { background: var(--dorado); transform: translateY(-2px); }
        
        .btn-salir { color: var(--dorado-oscuro); border: 1px solid var(--dorado-oscuro); }
        .btn-salir:hover { background: rgba(197, 160, 89, 0.1); }

        @media print {
            .acciones, .wallet-container { display: none; }
            body { background: white; padding: 0; }
            .credencial { border: none; box-shadow: none; margin: 0 auto; -webkit-print-color-adjust: exact; }
        }
    </style>
</head>
<body>

    <div class="credencial">
        <div class="header">
            <img src="logo_moderno.png" alt="Logo GLT" class="logo-glt">
            <h2>MUY RESPETABLE GRAN LOGIA<br>DE TAMAULIPAS</h2>
        </div>

        <div class="foto-wrap">
            <img src="" alt="Foto Hermano" id="disp-foto" class="foto-img">
            <div id="disp-no-foto" class="no-foto-icon">👤</div>
        </div>

        <div class="nombre-hermano" id="disp-nombre">Cargando...</div>
        <div class="grado-hermano" id="disp-grado">---</div>
        <div class="logia-hermano" id="disp-logia">---</div>

        <div id="qrcode"></div>

        <div>
            <div class="badge-status">ESTADO: EN APLOMO 2026</div>
        </div>

        <div class="wallet-container">
            <div class="wallet-buttons">
                <a href="javascript:void(0)" onclick="alert('Apple Wallet: Función en desarrollo con el servidor central.')">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/11/Add_to_Apple_Wallet_badge.svg/2560px-Add_to_Apple_Wallet_badge.svg.png" class="btn-wallet" alt="Apple Wallet">
                </a>
                <a href="javascript:void(0)" onclick="alert('Google Wallet: Función en desarrollo con el servidor central.')">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f2/Google_Wallet_Badge.svg/2560px-Google_Wallet_Badge.svg.png" class="btn-wallet" alt="Google Wallet">
                </a>
            </div>
            <p class="wallet-note">Certificación digital pendiente</p>
        </div>

        <div style="margin-top: 10px; font-size: 0.5rem; color: var(--dorado-oscuro); letter-spacing: 2px;">
            S.·. F.·. U.·.
        </div>
    </div>

    <div class="acciones">
        <a href="javascript:void(0)" class="btn-action btn-descargar" onclick="window.print()"> 
            📥 GUARDAR / IMPRIMIR CREDENCIAL 
        </a>
        <a href="index.html" class="btn-action btn-salir" onclick="sessionStorage.clear()"> 
            CERRAR SESIÓN SEGURA 
        </a>
    </div>

    <script>
        window.onload = function() {
            const data = JSON.parse(sessionStorage.getItem('hermanoValidado'));

            if (!data) {
                window.location.href = "identificacion.html";
                return;
            }

            // Datos Personales
            document.getElementById('disp-nombre').innerText = data.nombre_completo || "HERMANO";
            document.getElementById('disp-grado').innerText = data.grado || "SIN GRADO";

            // Lógica de Logia
            let nomLogia = data.logia_nombre || "Logia";
            let numLogia = data.numero_logia ? data.numero_logia.toString().trim() : "";
            if (numLogia !== "" && numLogia !== "0") {
                document.getElementById('disp-logia').innerText = `${nomLogia} #${numLogia}`;
            } else {
                document.getElementById('disp-logia').innerText = nomLogia;
            }

            // Foto desde PostImg
            const imgEl = document.getElementById('disp-foto');
            const iconEl = document.getElementById('disp-no-foto');

            if (data.url_fotografia && data.url_fotografia.trim() !== "") {
                imgEl.src = data.url_fotografia.trim();
                imgEl.onload = function() {
                    imgEl.style.display = 'block';
                    iconEl.style.display = 'none';
                };
                imgEl.onerror = function() {
                    imgEl.style.display = 'none';
                    iconEl.style.display = 'block';
                };
            }

            // Generar QR
            const idQR = data.numero_afiliacion || "0";
            new QRCode(document.getElementById("qrcode"), {
                text: `VALID:${idQR}|${data.nombre_completo}|${data.grado}`,
                width: 110,
                height: 110,
                colorDark : "#0a192f",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        };
    </script>
</body>
</html>
