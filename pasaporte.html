<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasaporte Digital | Gran Logia de Tamaulipas</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Hiram App">
    <link rel="apple-touch-icon" href="logo_moderno.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root {
            --azul-profundo: #0a192f;
            --azul-tarjeta: #112240;
            --dorado: #f9e29b;
            --dorado-oscuro: #c5a059;
            --blanco: #e6f1ff;
        }

        body {
            font-family: 'Lora', serif;
            background-color: var(--azul-profundo);
            color: var(--blanco);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            background-image: radial-gradient(circle at center, #112240 0%, #0a192f 100%);
        }

        /* --- CREDENCIAL --- */
        .credencial {
            width: 100%;
            max-width: 340px;
            background: linear-gradient(135deg, #112240 0%, #0a192f 100%);
            border: 2px solid var(--dorado-oscuro);
            border-radius: 20px;
            padding: 30px 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header {
            border-bottom: 1px solid rgba(197, 160, 89, 0.3);
            padding-bottom: 12px;
            margin-bottom: 20px;
        }

        .logo-glt { width: 60px; filter: drop-shadow(0 0 5px var(--dorado)); }
        
        h2 { 
            font-family: 'Cinzel'; 
            font-size: 0.8rem; 
            color: var(--dorado); 
            margin: 8px 0 0;
            letter-spacing: 1.5px;
            line-height: 1.3;
        }

        /* --- FOTOGRAFÍA --- */
        .foto-wrap {
            width: 120px;
            height: 120px;
            margin: 0 auto 15px;
            border-radius: 50%;
            border: 3px solid var(--dorado-oscuro);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            overflow: hidden;
            background-color: var(--azul-profundo);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .foto-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .no-foto-icon {
            font-size: 4rem;
            color: var(--dorado-oscuro);
            opacity: 0.5;
        }

        .nombre-hermano { 
            font-family: 'Cinzel'; 
            font-size: 1.25rem; 
            color: white; 
            margin: 10px 0 2px; 
            text-transform: uppercase;
        }

        .grado-hermano {
            font-family: 'Cinzel';
            font-size: 0.9rem;
            color: var(--dorado);
            font-weight: bold;
            margin-bottom: 5px;
            letter-spacing: 1.2px;
        }

        .afiliacion-hermano {
            font-family: 'Cinzel';
            font-size: 0.75rem;
            color: var(--blanco);
            background: rgba(197, 160, 89, 0.15);
            display: inline-block;
            padding: 3px 12px;
            border-radius: 4px;
            margin-bottom: 12px;
            border: 1px solid rgba(197, 160, 89, 0.3);
            letter-spacing: 1px;
        }

        .logia-hermano { 
            font-size: 0.8rem; 
            color: var(--dorado-oscuro); 
            margin-bottom: 15px; 
            letter-spacing: 1px;
        }

        #qrcode {
            background: white;
            padding: 10px;
            display: inline-block;
            border-radius: 12px;
            margin: 10px 0;
            border: 2px solid var(--dorado-oscuro);
        }

        /* --- BOTONES DE ACCIÓN --- */
        .acciones { margin-top: 30px; width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 12px; }
        
        .btn-action { 
            padding: 14px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-family: 'Cinzel'; 
            font-size: 0.75rem; 
            font-weight: bold; 
            text-align: center; 
            transition: 0.3s; 
            cursor: pointer; 
        }

        .btn-descargar { background: var(--dorado-oscuro); color: var(--azul-profundo); border: none; }
        .btn-descargar:hover { background: var(--dorado); transform: translateY(-2px); }
        
        .btn-salir { color: var(--dorado-oscuro); border: 1px solid var(--dorado-oscuro); }
        .btn-salir:hover { background: rgba(197, 160, 89, 0.1); }

        @media print {
            .acciones { display: none; }
            body { background: white; padding: 0; }
            .credencial { border: none; box-shadow: none; margin: 0 auto; -webkit-print-color-adjust: exact; }
        }
    </style>
</head>
<body>

    <div class="credencial">
        <div class="header">
            <img src="logo_moderno.png" alt="Logo GLT" class="logo-glt">
            <h2>MUY RESPETABLE GRAN LOGIA<br>DE TAMAULIPAS</h2>
        </div>

        <div class="foto-wrap">
            <img src="" alt="Foto Hermano" id="disp-foto" class="foto-img">
            <div id="disp-no-foto" class="no-foto-icon">👤</div>
        </div>

        <div class="nombre-hermano" id="disp-nombre">Cargando...</div>
        <div class="grado-hermano" id="disp-grado">---</div>
        
        <div class="afiliacion-hermano" id="disp-id">ID: 0000</div>

        <div class="logia-hermano" id="disp-logia">---</div>

        <div id="qrcode"></div>

        <div style="margin-top: 20px; font-size: 0.6rem; color: var(--dorado-oscuro); letter-spacing: 3px; font-weight: bold;">
            S.·. F.·. U.·.
        </div>
    </div>

    <div class="acciones">
        <a href="javascript:void(0)" class="btn-action btn-descargar" onclick="window.print()"> 
            📥 GUARDAR / IMPRIMIR CREDENCIAL 
        </a>
        <a href="index.html" class="btn-action btn-salir" onclick="sessionStorage.clear()"> 
            CERRAR SESIÓN SEGURA 
        </a>
    </div>

    <script>
        window.onload = function() {
            const data = JSON.parse(sessionStorage.getItem('hermanoValidado'));

            if (!data) {
                window.location.href = "identificacion.html";
                return;
            }

            // Datos principales
            document.getElementById('disp-nombre').innerText = data.nombre_completo || "HERMANO";
            document.getElementById('disp-grado').innerText = data.grado || "SIN GRADO";
            
            // ID de Afiliación
            const idVal = data.numero_afiliacion || "0000";
            document.getElementById('disp-id').innerText = `AFILIACIÓN: ${idVal}`;

            // Lógica de Logia
            let nomLogia = data.logia_nombre || "Logia";
            let numLogia = data.numero_logia ? data.numero_logia.toString().trim() : "";
            if (numLogia !== "" && numLogia !== "0" && numLogia !== "undefined") {
                document.getElementById('disp-logia').innerText = `${nomLogia} #${numLogia}`;
            } else {
                document.getElementById('disp-logia').innerText = nomLogia;
            }

            // Foto
            const imgEl = document.getElementById('disp-foto');
            const iconEl = document.getElementById('disp-no-foto');
            if (data.url_fotografia && data.url_fotografia.trim() !== "") {
                imgEl.src = data.url_fotografia.trim();
                imgEl.onload = function() {
                    imgEl.style.display = 'block';
                    iconEl.style.display = 'none';
                };
            }

            // Generar QR
            new QRCode(document.getElementById("qrcode"), {
                text: `VALID:${idVal}|${data.nombre_completo}|${data.grado}`,
                width: 120,
                height: 120,
                colorDark : "#0a192f",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        };
    </script>
</body>
</html>
