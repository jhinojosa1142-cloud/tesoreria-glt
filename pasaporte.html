<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Pasaporte Digital | Plataforma Hiram</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root {
            --azul-profundo: #0a192f;
            --azul-tarjeta: #112240;
            --dorado: #f9e29b;
            --dorado-oscuro: #c5a059;
            --blanco: #e6f1ff;
            --verde-aplomo: #2ecc71;
        }

        body {
            font-family: 'Lora', serif;
            background-color: var(--azul-profundo);
            color: var(--blanco);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header { text-align: center; margin-bottom: 30px; }
        h1 { font-family: 'Cinzel'; color: var(--dorado); font-size: 1.2rem; letter-spacing: 2px; }

        /* --- DISEÑO DE LA CREDENCIAL --- */
        .credencial-container {
            width: 100%;
            max-width: 350px;
            background: linear-gradient(145deg, #112240, #0a192f);
            border: 2px solid var(--dorado-oscuro);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .credencial-container::before {
            content: "🏛️";
            position: absolute;
            top: -20px; right: -20px;
            font-size: 8rem;
            opacity: 0.05;
            color: var(--dorado);
        }

        .header-card {
            border-bottom: 1px solid rgba(197, 160, 89, 0.3);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .header-card img { width: 60px; filter: drop-shadow(0 0 5px var(--dorado)); }
        .header-card h2 { font-family: 'Cinzel'; font-size: 0.8rem; color: var(--dorado); margin: 10px 0 0; }

        .nombre-hermano { font-family: 'Cinzel'; font-size: 1.2rem; color: white; margin: 15px 0 5px; }
        .logia-hermano { font-size: 0.8rem; color: var(--dorado-oscuro); margin-bottom: 15px; }

        #qrcode {
            background: white;
            padding: 12px;
            display: inline-block;
            border-radius: 10px;
            margin: 10px 0;
        }

        .status-badge {
            font-family: 'Cinzel';
            font-size: 0.7rem;
            font-weight: bold;
            color: var(--verde-aplomo);
            border: 1px solid var(--verde-aplomo);
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 10px;
        }

        /* --- BOTONES WALLET --- */
        .wallet-buttons {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 300px;
        }

        .btn-wallet {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            font-family: 'Cinzel';
            font-size: 0.8rem;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-apple { background: black; color: white; border: 1px solid #444; }
        .btn-google { background: white; color: #3c4043; border: 1px solid #dadce0; }
        
        .btn-wallet:hover { transform: scale(1.03); }

        .btn-salir {
            margin-top: 40px;
            color: var(--dorado-oscuro);
            text-decoration: none;
            font-size: 0.7rem;
            font-family: 'Cinzel';
        }
    </style>
</head>
<body>

    <header>
        <h1>MI PASAPORTE MASÓNICO</h1>
    </header>

    <div class="credencial-container" id="ticket">
        <div class="header-card">
            <img src="logo_moderno.png" alt="Logo">
            <h2>GRAN LOGIA DE TAMAULIPAS</h2>
