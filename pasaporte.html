<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasaporte Digital | Gran Logia</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --azul: #0a192f; --azul-l: #112240; --dorado: #f9e29b; --dorado-osc: #c5a059; --blanco: #e6f1ff; }
        body { font-family: 'Lora', serif; background: var(--azul); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: var(--blanco); }
        
        /* Contenedor de la Credencial */
        .card { 
            width: 340px; height: 550px; background: var(--azul-l); 
            border: 3px solid var(--dorado-osc); border-radius: 20px; 
            position: relative; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.8); 
            text-align: center; padding: 20px; display: none; /* Se oculta hasta que carguen los datos */
        }

        .header-logo { width: 70px; margin-bottom: 10px; filter: drop-shadow(0 0 8px var(--dorado)); }
        h1 { font-family: 'Cinzel'; font-size: 1.1rem; color: var(--dorado); margin: 0; letter-spacing: 2px; }
        
        .photo-frame { 
            width: 140px; height: 160px; margin: 15px auto; 
            border: 2px solid var(--dorado-osc); border-radius: 10px; 
            background: #000; overflow: hidden; 
        }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }

        .member-name { font-family: 'Cinzel'; font-size: 1.1rem; color: #fff; margin: 10px 0 5px; text-transform: uppercase; min-height: 1.2em; }
        .id-badge { 
            font-family: 'Cinzel'; font-size: 0.8rem; background: var(--dorado-osc); 
            color: var(--azul); padding: 5px 15px; border-radius: 20px; 
            font-weight: bold; display: inline-block; margin-top: 10px; 
        }
        
        .qr-area { 
            background: #fff; width: 110px; height: 110px; margin: 20px auto; 
            padding: 10px; border-radius: 10px; border: 2px solid var(--dorado-osc); 
        }
        .qr-area img { width: 100%; height: 100%; }

        /* Pantalla de Carga y Errores */
        #status-screen { 
            text-align: center; padding: 20px; font-family: 'Cinzel'; 
        }
        .btn-regresar {
            margin-top: 20px; padding: 10px 20px; background: var(--dorado-osc);
            color: var(--azul); border: none; border-radius: 5px; cursor: pointer; text-decoration: none; display: inline-block;
        }
    </style>
</head>
<body>

    <div id="status-screen">
        <h2 id="status-title" style="color:var(--dorado);">VALIDANDO IDENTIDAD...</h2>
        <p id="status-msg" style="font-size:0.8rem;">Accediendo al Archivum Digitalis</p>
    </div>

    <div class="card" id="passport-card">
        <img src="logo_moderno.png" class="header-logo">
        <h1>GRAN LOGIA DE TAMAULIPAS</h1>
        <p style="font-family:'Cinzel'; font-size:0.6rem; color:var(--dorado-osc); margin:0;">PASAPORTE MASÓNICO DIGITAL</p>

        <div class="photo-frame">
            <img src="https://via.placeholder.com/140x160?text=FOTO+H:." id="h_foto">
        </div>

        <div class="member-name" id="h_nombre">---</div>
        <div style="font-size: 0.8rem; color: var(--dorado-osc);">
            <span id="h_grado">GRADO</span> | <span id="h_logia">LOGIA</span>
        </div>

        <div class="id-badge" id="h_id">---</div>

        <div class="qr-area">
            <img id="h_qr" src="">
        </div>

        <div style="color:#2ecc71; font-size:0.7rem; font-weight:bold; letter-spacing:2px;">● MIEMBRO ACTIVO</div>
    </div>

<script>
    // URL de tu Padrón (Membresía)
    const CSV_MEMBRESIA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRHtXI5LY1DF7e6sHplXRgzQhk1yHaSZ7lKXUZvY2dTtkUKc29RvzZzCM6FffbYxoFWeIMst9ZKeP10/pub?gid=838211030&single=true&output=csv";

    function init() {
        // 1. Intentar obtener el ID (de la sesión o de la URL)
        let idBuscado = sessionStorage.getItem("usuarioLogueado") || new URLSearchParams(window.location.search).get('id');

        if (!idBuscado) {
            mostrarError("ACCESO DENEGADO", "No se detectó una sesión activa. Por favor inicie sesión.");
            return;
        }

        // 2. Leer el CSV
        Papa.parse(CSV_MEMBRESIA, {
            download: true,
            header: true,
            skipEmptyLines: true, // Crucial para evitar filas vacías
            complete: function(results) {
                const padron = results.data;
                
                // Buscamos con "Mapeo Seguro" (soporta minúsculas/mayúsculas del Excel)
                const hermano = padron.find(h => {
                    const idCol = h.ID_Masonico || h.id_masonico || h.ID || h["ID Masónico"] || "";
                    return idCol.toString().trim() === idBuscado.trim();
                });

                if (hermano) {
                    dibujarPasaporte(hermano);
                } else {
                    mostrarError("IDENTIDAD NO ENCONTRADA", "El ID " + idBuscado + " no existe en el Padrón.");
                }
            },
            error: function() {
                mostrarError("ERROR DE CONEXIÓN", "No se pudo leer la base de datos de Membresía.");
            }
        });
    }

    function dibujarPasaporte(h) {
        // Extraer datos con valores por defecto para evitar "undefined"
        const nombre = (h.Nombre || h.nombre || h.NOMBRE || "HERMANO").toUpperCase();
        const logia = (h.Logia || h.logia || h.LOGIA || "LOGIA NO REGISTRADA").toUpperCase();
        const gradoNum = h.Grado || h.grado || h.GRADO || "1";
        const id = (h.ID_Masonico || h.id_masonico || h.ID || h["ID Masónico"] || "---").toString().trim();

        const gradosTexto = { "1": "APRENDIZ MASÓN", "2": "COMPAÑERO MASÓN", "3": "MAESTRO MASÓN" };

        // Inyectar en los elementos
        document.getElementById('h_nombre').innerText = nombre;
        document.getElementById('h_logia').innerText = logia;
        document.getElementById('h_grado').innerText = gradosTexto[gradoNum] || "MAESTRO MASÓN";
        document.getElementById('h_id').innerText = id;
        
        // QR con fondo blanco forzado
        const qrUrl = `https://chart.googleapis.com/chart?chs=150x150&cht=qr&chl=${encodeURIComponent(id)}&choe=UTF-8`;
        document.getElementById('h_qr').src = qrUrl;

        // Mostrar tarjeta y ocultar pantalla de carga
        document.getElementById('status-screen').style.display = 'none';
        document.getElementById('passport-card').style.display = 'block';
    }

    function mostrarError(titulo, mensaje) {
        document.getElementById('status-title').innerText = titulo;
        document.getElementById('status-title').style.color = "#ff4d4d";
        document.getElementById('status-msg').innerText = mensaje;
        document.getElementById('status-screen').innerHTML += `<br><a href="identificacion.html" class="btn-regresar">REGRESAR AL LOGIN</a>`;
    }

    window.onload = init;
</script>
</body>
</html>
