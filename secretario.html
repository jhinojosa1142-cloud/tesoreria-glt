<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gran Secretaría | Archivum Digitalis</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { 
            --azul: #0a192f; --azul-l: #112240; --dorado: #f9e29b; 
            --dorado-osc: #c5a059; --blanco: #e6f1ff; --verde: #2ecc71; 
        }

        body { font-family: 'Lora', serif; background: var(--azul); color: var(--blanco); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }

        header { text-align: center; border-bottom: 2px solid var(--dorado-osc); padding-bottom: 20px; margin-bottom: 30px; }
        h1 { font-family: 'Cinzel'; color: var(--dorado); margin: 0; letter-spacing: 3px; }

        /* Barra de Herramientas */
        .toolbar { 
            display: flex; gap: 15px; background: var(--azul-l); padding: 20px; 
            border-radius: 10px; border: 1px solid rgba(197, 160, 89, 0.3); margin-bottom: 20px; align-items: center; 
        }

        input, select { 
            background: var(--azul); border: 1px solid var(--dorado-osc); 
            padding: 12px; color: white; border-radius: 5px; outline: none; 
        }

        .search-input { flex: 2; }
        .btn-nuevo { 
            background: var(--dorado-osc); color: var(--azul); border: none; 
            padding: 12px 25px; border-radius: 5px; font-family: 'Cinzel'; 
            font-weight: bold; cursor: pointer; transition: 0.3s; 
        }

        /* Tabla */
        .table-container { background: var(--azul-l); border-radius: 10px; overflow: hidden; border: 1px solid rgba(197, 160, 89, 0.2); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: rgba(197, 160, 89, 0.1); color: var(--dorado); padding: 15px; font-family: 'Cinzel'; font-size: 0.75rem; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: middle; }
        
        .qr-thumb { width: 45px; height: 45px; border: 1px solid var(--dorado); border-radius: 4px; background: white; }

        /* Modal */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; 
        }
        .modal-content { 
            background: var(--azul-l); padding: 30px; border-radius: 15px; 
            border: 2px solid var(--dorado); width: 90%; max-width: 600px; 
        }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .full-width { grid-column: span 2; }
        label { display: block; font-family: 'Cinzel'; font-size: 0.65rem; color: var(--dorado-osc); margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>GRAN SECRETARÍA</h1>
        <p style="font-family:'Cinzel'; color: var(--dorado-osc); font-size: 0.7rem; letter-spacing: 2px;">Gestión de Padrón y Credenciales QR</p>
    </header>

    <div class="toolbar">
        <input type="text" id="inputBuscar" class="search-input" placeholder="Buscar por Nombre o ID Masónico..." oninput="filtrarTabla()">
        <select id="filtroLogia" onchange="filtrarTabla()">
            <option value="">Todas las Logias</option>
        </select>
        <button class="btn-nuevo" onclick="abrirModal()">+ NUEVO INGRESO</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>QR</th>
                    <th>ID Masónico</th>
                    <th>Nombre del Hermano</th>
                    <th>Logia</th>
                    <th>Grado</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="padrónContent">
                </tbody>
        </table>
    </div>
</div>

<div id="modalAlta" class="modal">
    <div class="modal-content">
        <h2 style="font-family:'Cinzel'; color:var(--dorado); text-align:center; margin-top:0;">Registro de Membresía</h2>
        <form id="formAlta">
            <div class="form-grid">
                <div class="full-width">
                    <label>ID Masónico (Número de Membresía para el QR)</label>
                    <input type="text" id="h_id_masonico" placeholder="Ej: GL-2026-001" style="width:96%" required>
                </div>
                <div class="full-width">
                    <label>Nombre Completo</label>
                    <input type="text" id="h_nombre" style="width:96%" required>
                </div>
                <div>
                    <label>Logia</label>
                    <select id="h_logia" style="width:100%" required></select>
                </div>
                <div>
                    <label>Grado Actual</label>
                    <select id="h_grado" style="width:100%">
                        <option value="1">1° - Aprendiz</option>
                        <option value="2">2° - Compañero</option>
                        <option value="3">3° - Maestro Masón</option>
                    </select>
                </div>
                <div>
                    <label>Correo</label>
                    <input type="email" id="h_correo" style="width:90%" required>
                </div>
                <div>
                    <label>Teléfono</label>
                    <input type="text" id="h_tel" style="width:90%">
                </div>
                <div class="full-width" style="text-align:right; margin-top:15px;">
                    <button type="button" onclick="cerrarModal()" style="background:none; color:white; border:1px solid; padding:10px 20px; cursor:pointer;">Cancelar</button>
                    <button type="submit" id="btnGuardar" style="background:var(--verde); color:var(--azul); border:none; padding:10px 30px; font-weight:bold; cursor:pointer;">Guardar Registro</button>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
    // --- REEMPLAZA ESTOS DATOS ---
    const CSV_MEMBRESIA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRHtXI5LY1DF7e6sHplXRgzQhk1yHaSZ7lKXUZvY2dTtkUKc29RvzZzCM6FffbYxoFWeIMst9ZKeP10/pub?gid=838211030&single=true&output=csv";
    const CSV_LOGIAS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRHtXI5LY1DF7e6sHplXRgzQhk1yHaSZ7lKXUZvY2dTtkUKc29RvzZzCM6FffbYxoFWeIMst9ZKeP10/pub?gid=0&single=true&output=csv";
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbya03a8zzYX8xyGMvCxvGKEChfHGK7cTjOnF1-lRuDVmc5wC-aSRBHcz0IjNjMI9Wd-_w/exec";

    let hermanos = [];

    function init() {
        // Cargar Logias para dropdowns
        Papa.parse(CSV_LOGIAS, { download: true, header: true, complete: (r) => {
            const logs = r.data.filter(x => x.nombre_logia);
            logs.forEach(l => {
                document.getElementById('filtroLogia').add(new Option(l.nombre_logia, l.nombre_logia));
                document.getElementById('h_logia').add(new Option(l.nombre_logia, l.nombre_logia));
            });
        }});

        // Cargar Padrón
        Papa.parse(CSV_MEMBRESIA, { download: true, header: true, complete: (r) => {
            hermanos = r.data.filter(x => x.ID_Masonico);
            renderTabla(hermanos);
        }});
    }

    function renderTabla(data) {
        const tbody = document.getElementById('padrónContent');
        tbody.innerHTML = '';
        data.forEach(h => {
            // Generador de QR dinámico basado en el ID Masónico
            const qrUrl = `https://chart.googleapis.com/chart?chs=150x150&cht=qr&chl=${encodeURIComponent(h.ID_Masonico)}&choe=UTF-8`;
            
            tbody.innerHTML += `
                <tr>
                    <td><img src="${qrUrl}" class="qr-thumb"></td>
                    <td style="font-family:'Cinzel'; color:var(--dorado-osc); font-weight:bold;">${h.ID_Masonico}</td>
                    <td><b>${h.Nombre}</b></td>
                    <td>${h.Logia}</td>
                    <td><span style="background:var(--dorado-osc); color:var(--azul); padding:2px 6px; border-radius:3px; font-size:0.7rem;">${h.Grado}°</span></td>
                    <td style="color:var(--verde); font-size:0.7rem;">● ACTIVO</td>
                </tr>`;
        });
    }

    function filtrarTabla() {
        const busqueda = document.getElementById('inputBuscar').value.toLowerCase();
        const logia = document.getElementById('filtroLogia').value;
        const filtrados = hermanos.filter(h => {
            const coincideBusqueda = h.Nombre.toLowerCase().includes(busqueda) || h.ID_Masonico.toLowerCase().includes(busqueda);
            const coincideLogia = logia === "" || h.Logia === logia;
            return coincideBusqueda && coincideLogia;
        });
        renderTabla(filtrados);
    }

    function abrirModal() { document.getElementById('modalAlta').style.display = 'flex'; }
    function cerrarModal() { document.getElementById('modalAlta').style.display = 'none'; }

    document.getElementById('formAlta').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnGuardar');
        btn.innerText = "PROCESANDO...";
        btn.disabled = true;

        const datos = {
            accion: "ALTA_HERMANO",
            idMasonico: document.getElementById('h_id_masonico').value,
            nombre: document.getElementById('h_nombre').value,
            logia: document.getElementById('h_logia').value,
            grado: document.getElementById('h_grado').value,
            correo: document.getElementById('h_correo').value,
            tel: document.getElementById('h_tel').value
        };

        try {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(datos) });
            alert("Hermano registrado con éxito.");
            location.reload();
        } catch (err) {
            alert("Error al conectar con el servidor.");
            btn.innerText = "Guardar Registro";
            btn.disabled = false;
        }
    };

    window.onload = init;
</script>
</body>
</html>
