<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gran Secretaría | Archivum Digitalis</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { 
            --azul: #0a192f; 
            --azul-l: #112240; 
            --dorado: #f9e29b; 
            --dorado-osc: #c5a059; 
            --blanco: #e6f1ff; 
            --verde: #2ecc71; 
            --rojo: #e74c3c;
        }

        body { 
            font-family: 'Lora', serif; 
            background: var(--azul); 
            color: var(--blanco); 
            margin: 0; 
            padding: 20px; 
            line-height: 1.6;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        header { 
            text-align: center; 
            border-bottom: 2px solid var(--dorado-osc); 
            padding-bottom: 20px; 
            margin-bottom: 30px; 
        }

        h1 { 
            font-family: 'Cinzel'; 
            color: var(--dorado); 
            margin: 0; 
            letter-spacing: 3px; 
            text-transform: uppercase;
        }

        /* Barra de Herramientas */
        .toolbar { 
            display: flex; 
            gap: 15px; 
            background: var(--azul-l); 
            padding: 20px; 
            border-radius: 10px; 
            border: 1px solid rgba(197, 160, 89, 0.3); 
            margin-bottom: 20px; 
            align-items: center; 
            flex-wrap: wrap;
        }

        input, select { 
            background: var(--azul); 
            border: 1px solid var(--dorado-osc); 
            padding: 12px; 
            color: white; 
            border-radius: 5px; 
            outline: none; 
            font-family: 'Lora';
        }

        .search-input { flex: 2; min-width: 250px; }
        .filter-select { flex: 1; min-width: 150px; }

        .btn-nuevo { 
            background: var(--dorado-osc); 
            color: var(--azul); 
            border: none; 
            padding: 12px 25px; 
            border-radius: 5px; 
            font-family: 'Cinzel'; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s;
        }

        .btn-nuevo:hover { 
            background: var(--dorado); 
            transform: translateY(-2px); 
            box-shadow: 0 4px 15px rgba(249, 226, 155, 0.3);
        }

        /* Tabla de Padrón */
        .table-container { 
            background: var(--azul-l); 
            border-radius: 10px; 
            overflow-x: auto; 
            border: 1px solid rgba(197, 160, 89, 0.2); 
        }

        table { width: 100%; border-collapse: collapse; text-align: left; }

        th { 
            background: rgba(197, 160, 89, 0.1); 
            color: var(--dorado); 
            padding: 15px; 
            font-family: 'Cinzel'; 
            font-size: 0.75rem; 
            text-transform: uppercase;
        }

        td { 
            padding: 15px; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            font-size: 0.9rem; 
        }

        .grado-tag { 
            padding: 4px 8px; 
            border-radius: 4px; 
            font-size: 0.7rem; 
            font-weight: bold; 
            background: var(--dorado-osc); 
            color: var(--azul); 
        }

        /* MODAL */
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.85); 
            z-index: 1000; 
            justify-content: center; 
            align-items: center; 
        }

        .modal-content { 
            background: var(--azul-l); 
            padding: 30px; 
            border-radius: 15px; 
            border: 2px solid var(--dorado); 
            width: 90%; 
            max-width: 650px; 
            box-shadow: 0 0 40px rgba(0,0,0,0.6); 
        }

        .form-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            margin-top: 20px; 
        }

        .full-width { grid-column: span 2; }

        label { 
            display: block; 
            font-family: 'Cinzel'; 
            font-size: 0.65rem; 
            color: var(--dorado-osc); 
            margin-bottom: 5px; 
        }

        .btn-cancel { background: transparent; color: white; border: 1px solid; padding: 10px 20px; cursor: pointer; }
        .btn-save { background: var(--verde); color: var(--azul); border: none; padding: 10px 30px; font-weight: bold; cursor: pointer; }

    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>GRAN SECRETARÍA</h1>
        <p style="font-family:'Cinzel'; font-size: 0.75rem; color: var(--dorado-osc); letter-spacing: 2px;">Gestión de Padrón y Membresía Masónica</p>
    </header>

    <div class="toolbar">
        <input type="text" id="inputBuscar" class="search-input" placeholder="Buscar hermano por nombre..." oninput="filtrarTabla()">
        <select id="filtroLogia" class="filter-select" onchange="filtrarTabla()">
            <option value="">Todas las Logias</option>
        </select>
        <button class="btn-nuevo" onclick="abrirModal()">+ NUEVO INGRESO</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Folio / ID</th>
                    <th>Nombre del Hermano</th>
                    <th>Logia Simbólica</th>
                    <th>Grado</th>
                    <th>Estado</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="padrónContent">
                </tbody>
        </table>
    </div>
</div>

<div id="modalAlta" class="modal">
    <div class="modal-content">
        <h2 style="font-family:'Cinzel'; color:var(--dorado); margin:0; text-align:center;">REGISTRO DE NUEVO HERMANO</h2>
        <form id="formAlta">
            <div class="form-grid">
                <div class="full-width">
                    <label>Nombre Completo (Sin abreviaturas)</label>
                    <input type="text" id="h_nombre" style="width:96%" required>
                </div>
                <div>
                    <label>Logia Perteneciente</label>
                    <select id="h_logia" style="width:100%" required>
                        <option value="">-- Seleccionar --</option>
                        </select>
                </div>
                <div>
                    <label>Grado Actual</label>
                    <select id="h_grado" style="width:100%">
                        <option value="1">1° Aprendiz</option>
                        <option value="2">2° Compañero</option>
                        <option value="3">3° Maestro Masón</option>
                    </select>
                </div>
                <div>
                    <label>Correo Electrónico</label>
                    <input type="email" id="h_correo" style="width:90%" required>
                </div>
                <div>
                    <label>Teléfono de Contacto</label>
                    <input type="text" id="h_tel" style="width:90%">
                </div>
                <div class="full-width" style="text-align:right; margin-top:20px; border-top:1px solid rgba(197,160,89,0.2); padding-top:20px;">
                    <button type="button" class="btn-cancel" onclick="cerrarModal()">CANCELAR</button>
                    <button type="submit" id="btnGuardar" class="btn-save">GUARDAR EN ARCHIVO</button>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
    // --- CONFIGURACIÓN DE ENLACES ---
    const CSV_MEMBRESIA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRHtXI5LY1DF7e6sHplXRgzQhk1yHaSZ7lKXUZvY2dTtkUKc29RvzZzCM6FffbYxoFWeIMst9ZKeP10/pub?gid=838211030&single=true&output=csv"; // Pestaña "Membresia" publicada como CSV
    const CSV_LOGIAS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRHtXI5LY1DF7e6sHplXRgzQhk1yHaSZ7lKXUZvY2dTtkUKc29RvzZzCM6FffbYxoFWeIMst9ZKeP10/pub?gid=0&single=true&output=csv";      // Pestaña "Sheet1" publicada como CSV
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwaveXszk1SZ83r0kZTYZjgrXIYvtC2gI_DBv42lYWiO-Q3qtWsklaNdaTgngb-fkwugA/exec";          // URL de tu implementación de Google Apps Script

    let todosLosHermanos = [];

    // Función inicial al cargar
    function init() {
        // Cargar Logias para los menús desplegables
        Papa.parse(CSV_LOGIAS, {
            download: true,
            header: true,
            complete: (result) => {
                const logias = result.data.filter(x => x.nombre_logia);
                const fLogia = document.getElementById('filtroLogia');
                const hLogia = document.getElementById('h_logia');
                logias.forEach(l => {
                    fLogia.add(new Option(l.nombre_logia, l.nombre_logia));
                    hLogia.add(new Option(l.nombre_logia, l.nombre_logia));
                });
            }
        });

        // Cargar Padrón de Membresía
        Papa.parse(CSV_MEMBRESIA, {
            download: true,
            header: true,
            complete: (result) => {
                todosLosHermanos = result.data.filter(x => x.Nombre);
                renderTabla(todosLosHermanos);
            }
        });
    }

    // Dibujar la tabla
    function renderTabla(data) {
        const tbody = document.getElementById('padrónContent');
        tbody.innerHTML = '';
        data.forEach(h => {
            tbody.innerHTML += `
                <tr>
                    <td style="font-family:'Cinzel'; color:var(--dorado-osc); font-size:0.7rem;">${h.ID_QR || '---'}</td>
                    <td><b>${h.Nombre}</b></td>
                    <td>${h.Logia}</td>
                    <td><span class="grado-tag">${h.Grado}°</span></td>
                    <td style="color:var(--verde); font-size:0.7rem; font-weight:bold;">● ACTIVO</td>
                    <td><button onclick="alert('Folio: ${h.ID_QR}')" style="background:none; border:1px solid var(--dorado-osc); color:var(--dorado-osc); cursor:pointer; padding:3px 8px; border-radius:3px;">Ver</button></td>
                </tr>`;
        });
    }

    // Filtros de búsqueda
    function filtrarTabla() {
        const texto = document.getElementById('inputBuscar').value.toLowerCase();
        const logia = document.getElementById('filtroLogia').value;
        
        const filtrados = todosLosHermanos.filter(h => {
            const matchNombre = h.Nombre.toLowerCase().includes(texto);
            const matchLogia = logia === "" || h.Logia === logia;
            return matchNombre && matchLogia;
        });
        renderTabla(filtrados);
    }

    // Lógica del Modal
    function abrirModal() { 
        document.getElementById('modalAlta').style.display = 'flex'; 
    }
    
    function cerrarModal() { 
        document.getElementById('modalAlta').style.display = 'none'; 
    }

    // Envío del Formulario
    document.getElementById('formAlta').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnGuardar');
        btn.innerText = "PROCESANDO...";
        btn.disabled = true;

        const datos = {
            accion: "ALTA_HERMANO",
            nombre: document.getElementById('h_nombre').value,
            logia: document.getElementById('h_logia').value,
            grado: document.getElementById('h_grado').value,
            correo: document.getElementById('h_correo').value,
            tel: document.getElementById('h_tel').value
        };

        try {
            await fetch(SCRIPT_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify(datos) 
            });
            alert("Hermano registrado correctamente en el Padrón.");
            location.reload();
        } catch (err) { 
            alert("Error al conectar con el servidor."); 
            btn.innerText = "GUARDAR";
            btn.disabled = false;
        }
    };

    // Cerrar modal al hacer clic fuera
    window.onclick = function(event) {
        if (event.target == document.getElementById('modalAlta')) {
            cerrarModal();
        }
    }

    window.onload = init;
</script>
</body>
</html>
