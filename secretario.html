<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gran Secretaría | Archivum Digitalis</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora&display=swap" rel="stylesheet">
    <style>
        :root { --azul: #0a192f; --azul-l: #112240; --dorado: #f9e29b; --dorado-osc: #c5a059; --blanco: #e6f1ff; }
        body { font-family: 'Lora', serif; background: var(--azul); color: var(--blanco); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; border-bottom: 2px solid var(--dorado-osc); padding-bottom: 20px; margin-bottom: 30px; }
        
        .search-box { background: var(--azul-l); padding: 20px; border-radius: 10px; border: 1px solid var(--dorado-osc); margin-bottom: 20px; display: flex; gap: 10px; }
        input { flex: 1; background: var(--azul); border: 1px solid var(--dorado-osc); padding: 10px; color: white; border-radius: 5px; }
        
        .btn-accion { background: var(--dorado-osc); color: var(--azul); border: none; padding: 10px 20px; border-radius: 5px; font-family: 'Cinzel'; font-weight: bold; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; background: var(--azul-l); border-radius: 8px; overflow: hidden; }
        th { background: rgba(197, 160, 89, 0.2); color: var(--dorado); padding: 15px; font-family: 'Cinzel'; font-size: 0.8rem; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .grado-pill { padding: 3px 8px; border-radius: 3px; font-size: 0.7rem; font-weight: bold; background: var(--dorado-osc); color: var(--azul); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Gran Secretaría</h1>
        <p style="font-family:'Cinzel'; color:var(--dorado-osc); letter-spacing: 2px;">Gestión de Padrón y Trámites</p>
    </header>

    <div class="search-box">
        <input type="text" id="busqueda" placeholder="Buscar por Nombre, Logia o Grado..." oninput="filtrarHermanos()">
        <button class="btn-accion">+ NUEVO INGRESO</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Nombre del Hermano</th>
                <th>Logia</th>
                <th>Grado</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="padrónContent">
            </tbody>
    </table>
</div>

</body>
</html>
