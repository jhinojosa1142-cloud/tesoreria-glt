<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gran Secretaría | Archivum Digitalis</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { 
            --azul: #0a192f; --azul-l: #112240; --dorado: #f9e29b; 
            --dorado-osc: #c5a059; --blanco: #e6f1ff; --verde: #2ecc71; 
        }

        body { font-family: 'Lora', serif; background: var(--azul); color: var(--blanco); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }

        header { text-align: center; border-bottom: 2px solid var(--dorado-osc); padding-bottom: 20px; margin-bottom: 30px; }
        h1 { font-family: 'Cinzel'; color: var(--dorado); margin: 0; letter-spacing: 3px; text-transform: uppercase; }

        /* Toolbar */
        .toolbar { 
            display: flex; gap: 15px; background: var(--azul-l); padding: 20px; 
            border-radius: 10px; border: 1px solid rgba(197, 160, 89, 0.3); margin-bottom: 20px; align-items: center; 
        }

        input, select { 
            background: var(--azul); border: 1px solid var(--dorado-osc); 
            padding: 12px; color: white; border-radius: 5px; outline: none; font-family: 'Lora';
        }

        .search-input { flex: 2; }
        .btn-nuevo { 
            background: var(--dorado-osc); color: var(--azul); border: none; 
            padding: 12px 25px; border-radius: 5px; font-family: 'Cinzel'; 
            font-weight: bold; cursor: pointer; transition: 0.3s; 
        }
        .btn-nuevo:hover { background: var(--dorado); transform: translateY(-2px); }

        /* Tabla */
        .table-container { background: var(--azul-l); border-radius: 10px; overflow: hidden; border: 1px solid rgba(197, 160, 89, 0.2); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: rgba(197, 160, 89, 0.1); color: var(--dorado); padding: 15px; font-family: 'Cinzel'; font-size: 0.75rem; text-transform: uppercase; }
        td { padding: 12px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: middle; }
        
        .qr-thumb { 
            width: 60px; height: 60px; border: 2px solid var(--dorado-osc); 
            border-radius: 5px; background: white; cursor: pointer; transition: 0.2s;
            display: block; margin: auto;
        }

        .grado-tag { background: var(--dorado-osc); color: var(--azul); padding: 3px 8px; border-radius: 4px; font-weight: bold; font-size: 0.75rem; }

        /* Modal */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; 
        }
        .modal-content { 
            background: var(--azul-l); padding: 30px; border-radius: 15px; 
            border: 2px solid var(--dorado); width: 90%; max-width: 600px; 
        }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .full-width { grid-column: span 2; }
        label { display: block; font-family: 'Cinzel'; font-size: 0.65rem; color: var(--dorado-osc); margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Gran Secretaría</h1>
        <p style="font-family:'Cinzel'; color: var(--dorado-osc); font-size: 0.7rem; letter-spacing: 2px;">Gestión de Padrón y Credenciales QR</p>
    </header>

    <div class="toolbar">
        <input type="text" id="inputBuscar" class="search-input" placeholder="Buscar por Nombre o ID Masónico..." oninput="filtrarTabla()">
        <select id="filtroLogia" onchange="filtrarTabla()">
            <option value="">Todas las Logias</option>
        </select>
        <button class="btn-nuevo" onclick="abrirModal()">+ NUEVO INGRESO</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="text-align:center;">Código QR</th>
                    <th>ID Masónico</th>
                    <th>Nombre del Hermano</th>
                    <th>Logia</th>
                    <th>Grado</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="padrónContent"></tbody>
        </table>
    </div>
</div>

<div id="modalAlta" class="modal">
    <div class="modal-content">
        <h2 style="font-family:'Cinzel'; color:var(--dorado); text-align:center; margin-top:0; letter-spacing: 2px;">REGISTRO DE MEMBRESÍA</h2>
        <form id="formAlta">
            <div class="form-grid">
                <div class="full-width">
                    <label>ID Masónico (Número de Membresía para el QR)</label>
                    <input type="text" id="h_id_masonico" placeholder="Ej: GL-12345" style="width:96%" required>
                </div>
                <div class="full-width">
                    <label>Nombre Completo</label>
                    <input type="text" id="h_nombre" style="width:96%" required>
                </div>
                <div>
                    <label>Logia</label>
                    <select id="h_logia" style="width:100%" required></select>
                </div>
                <div>
                    <label>Grado Actual</label>
                    <select id="h_grado" style="width:100%">
                        <option value="1">1° - Aprendiz</option>
                        <option value="2">2° - Compañero</option>
                        <option value="3">3° - Maestro Masón</option>
                    </select>
                </div>
                <div>
                    <label>Correo Electrónico</label>
                    <input type="email" id="h_correo" style="width:90%" required>
                </div>
                <div>
                    <label>Teléfono de Contacto</label>
                    <input type="text" id="h_tel" style="width:90%">
                </div>
                <div class="full-width" style="text-align:right; margin-top:20px; border-top:1px solid rgba(197,160,89,0.2); padding-top:20px;">
                    <button type="button" onclick="cerrarModal()" style="background:none; color:white; border:1px solid; padding:10px 20px; cursor:pointer; font-family:'Cinzel';">CANCELAR</button>
                    <button type="submit" id="btnGuardar" style="background:var(--verde); color:var(--azul); border:none; padding:10px 30px; font-weight:bold; cursor:pointer; font-family:'Cinzel';">GUARDAR REGISTRO</button>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
    // --- CONFIGURACIÓN (REEMPLAZA CON TUS URLs) ---
    const CSV_MEMBRESIA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRHtXI5LY1DF7e6sHplXRgzQhk1yHaSZ7lKXUZvY2dTtkUKc29RvzZzCM6FffbYxoFWeIMst9ZKeP10/pub?gid=838211030&single=true&output=csv";
    const CSV_LOGIAS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRHtXI5LY1DF7e6sHplXRgzQhk1yHaSZ7lKXUZvY2dTtkUKc29RvzZzCM6FffbYxoFWeIMst9ZKeP10/pub?gid=0&single=true&output=csv";
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbya03a8zzYX8xyGMvCxvGKEChfHGK7cTjOnF1-lRuDVmc5wC-aSRBHcz0IjNjMI9Wd-_w/exec";

    let hermanos = [];

    function init() {
        // Cargar Logias para dropdowns
        Papa.parse(CSV_LOGIAS, { download: true, header: true, complete: (r) => {
            const logs = r.data.filter(x => x.nombre_logia || x.Logia);
            const fLogia = document.getElementById('filtroLogia');
            const hLogia = document.getElementById('h_logia');
            logs.forEach(l => {
                const nombre = l.nombre_logia || l.Logia;
                fLogia.add(new Option(nombre, nombre));
                hLogia.add(new Option(nombre, nombre));
            });
        }});

        // Cargar Padrón de Membresía
        Papa.parse(CSV_MEMBRESIA, { download: true, header: true, complete: (r) => {
            hermanos = r.data.filter(x => x.ID_Masonico || x.id_masonico || x.ID || x["ID Masónico"]);
            renderTabla(hermanos);
        }});
    }

    function renderTabla(data) {
        const tbody = document.getElementById('padrónContent');
        tbody.innerHTML = '';
        
        data.forEach(h => {
            // MAPEO SEGURO: Busca el dato sin importar cómo esté escrito en el Excel
            const id = h.ID_Masonico || h.id_masonico || h.ID || h["ID Masónico"] || "000";
            const nombre = h.Nombre || h.nombre || h.NOMBRE || "---";
            const logia = h.Logia || h.logia || h.LOGIA || "---";
            const grado = h.Grado || h.grado || h.GRADO || "1";
            
            // Generar URL del QR (Google Charts API)
            const idLimpio = id.toString().trim();
            const qrUrl = "https://chart.googleapis.com/chart?chs=150x150&cht=qr&chl=" + encodeURIComponent("https://TU-URL.com/pasaporte.html?id=" + id);
            
            tbody.innerHTML += `
                <tr>
                    <td style="text-align:center;">
                        <img src="${qrUrl}" 
                             class="qr-thumb" 
                             alt="QR"
                             onclick="window.open('${qrUrl}')" 
                             title="Clic para ampliar QR"
                             onerror="this.src='https://via.placeholder.com/60?text=ERR'">
                    </td>
                    <td style="font-family:'Cinzel'; color:var(--dorado-osc); font-weight:bold;">${idLimpio}</td>
                    <td><b>${nombre}</b></td>
                    <td>${logia}</td>
                    <td><span class="grado-tag">${grado}°</span></td>
                    <td style="color:var(--verde); font-size:0.75rem; font-weight:bold;">● ACTIVO</td>
                </tr>`;
        });
    }

    function filtrarTabla() {
        const busqueda = document.getElementById('inputBuscar').value.toLowerCase();
        const logia = document.getElementById('filtroLogia').value;
        const filtrados = hermanos.filter(h => {
            const valID = (h.ID_Masonico || h.id_masonico || h.ID || h["ID Masónico"] || "").toString().toLowerCase();
            const valNom = (h.Nombre || h.nombre || h.NOMBRE || "").toString().toLowerCase();
            const valLogia = h.Logia || h.logia || h.LOGIA || "";
            
            const coincideBusqueda = valNom.includes(busqueda) || valID.includes(busqueda);
            const coincideLogia = logia === "" || valLogia === logia;
            return coincideBusqueda && coincideLogia;
        });
        renderTabla(filtrados);
    }

    function abrirModal() { document.getElementById('modalAlta').style.display = 'flex'; }
    function cerrarModal() { 
        document.getElementById('modalAlta').style.display = 'none'; 
        document.getElementById('formAlta').reset();
    }

    document.getElementById('formAlta').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnGuardar');
        btn.innerText = "REGISTRANDO...";
        btn.disabled = true;

        const datos = {
            accion: "ALTA_HERMANO",
            idMasonico: document.getElementById('h_id_masonico').value,
            nombre: document.getElementById('h_nombre').value,
            logia: document.getElementById('h_logia').value,
            grado: document.getElementById('h_grado').value,
            correo: document.getElementById('h_correo').value,
            tel: document.getElementById('h_tel').value
        };

        try {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(datos) });
            alert("Hermano registrado con éxito.");
            location.reload();
        } catch (err) {
            alert("Error al conectar con el servidor.");
            btn.innerText = "GUARDAR REGISTRO";
            btn.disabled = false;
        }
    };

    window.onclick = (e) => { if(e.target == document.getElementById('modalAlta')) cerrarModal(); };
    window.onload = init;
</script>
</body>
</html>
