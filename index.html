<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIT - Gran Logia de Tamaulipas</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-profundo: #0a192f; --azul-tarjeta: #112240; --dorado: #f9e29b;
            --dorado-oscuro: #c5a059; --texto-suave: #e6f1ff; --exito: #27ae60; --error: #c0392b;
        }
        body { font-family: 'Lora', serif; background-color: var(--azul-profundo); margin: 0; color: var(--texto-suave); min-height: 100vh; display: flex; flex-direction: column; }
        h2 { font-family: 'Cinzel', serif; color: var(--dorado); text-transform: uppercase; text-align: center; }
        .login-card { max-width: 400px; margin: 60px auto; background: var(--azul-tarjeta); padding: 40px; border: 2px solid var(--dorado-oscuro); border-radius: 8px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo-img { width: 180px; margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(249, 226, 155, 0.3)); }
        input { width: 100%; padding: 12px; margin: 10px 0; background: rgba(255,255,255,0.05); border: 1px solid var(--dorado-oscuro); border-radius: 4px; color: white; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; background: var(--dorado); color: var(--azul-profundo); padding: 15px; border: none; border-radius: 4px; font-family: 'Cinzel'; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        #panel { display: none; max-width: 900px; margin: 40px auto; background: var(--azul-tarjeta); padding: 30px; border-radius: 10px; border: 1px solid var(--dorado-oscuro); }
        .panel-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--dorado); padding-bottom: 15px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { color: var(--dorado); padding: 12px; text-align: left; border-bottom: 2px solid var(--dorado-oscuro); font-family: 'Cinzel'; }
        td { padding: 12px; border-bottom: 1px solid rgba(197, 160, 89, 0.1); }
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; color: white; }
        .PAGADO { background: var(--exito); }
        .PENDIENTE { background: var(--error); }
        footer { margin-top: auto; padding: 20px; text-align: center; color: var(--dorado-oscuro); font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="login-screen" class="login-card">
        <img src="logo_moderno.jpg" alt="GLT" class="logo-img">
        <h2>Tesorería GLT</h2>
        <div id="loader" style="font-size: 0.8rem; color: var(--dorado-oscuro); margin-bottom: 10px;">Sincronizando con Gran Bóveda...</div>
        <input type="text" id="logia-id" placeholder="Número de Logia">
        <input type="password" id="logia-pass" placeholder="Contraseña">
        <button onclick="intentarEntrar()">INGRESAR</button>
    </div>

    <div id="panel">
        <div class="panel-header">
            <h2 id="nombre-display" style="margin:0; font-size: 1.1rem;"></h2>
            <div style="display:flex; gap:10px;">
                <a href="https://docs.google.com/forms/d/e/1FAIpQLSdzMxL1YduE6spA93u_ChQGm_ACOZe79byjQXqpIyHtoEaWTw/viewform?usp=header" target="_blank" style="background:var(--exito); color:white; padding:10px 15px; text-decoration:none; border-radius:4px; font-family:'Cinzel'; font-size:0.7rem; font-weight:bold;">REPORTAR PAGO</a>
                <button onclick="location.reload()" style="background:#444; width:auto; padding:10px 15px; margin:0;">SALIR</button>
            </div>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Mes</th>
                    <th>Monto</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="tabla-body"></tbody>
        </table>
    </div>

    <footer>
        <p>A.·. L.·. G.·. A.·. D.·. U.·.<br>Gran Logia de Tamaulipas &copy; 2026</p>
    </footer>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRHtXI5LY1DF7e6sHplXRgzQhk1yHaSZ7lKXUZvY2dTtkUKc29RvzZzCM6FffbYxoFWeIMst9ZKeP10/pub?output=csv";
        let database = [];

        async function cargarDatos() {
            try {
                const res = await fetch(SHEET_URL + "&cache=" + new Date().getTime());
                const csvText = await res.text();
                
                // DETECCIÓN AUTOMÁTICA DE SEPARADOR (Coma o Punto y Coma)
                const lineas = csvText.split(/\r?\n/).filter(l => l.trim() !== "");
                const separador = lineas[0].indexOf(';') > -1 ? ';' : ',';
                
                database = lineas.slice(1).map(f => {
                    const c = f.split(separador);
                    const limpiar = (t) => (t || "").replace(/"/g, "").trim();
                    return {
                        id: limpiar(c[0]),     // Columna A
                        pass: limpiar(c[1]),   // Columna B
                        nombre: limpiar(c[2]), // Columna C
                        mes: limpiar(c[3]),    // Columna D
                        monto: limpiar(c[4]),  // Columna E
                        estado: limpiar(c[5]).toUpperCase() // Columna F
                    };
                });
                document.getElementById('loader').innerText = "Conexión Establecida ✔";
            } catch (e) {
                document.getElementById('loader').innerText = "Error de Conexión ❌";
            }
        }

        function intentarEntrar() {
            const u = document.getElementById('logia-id').value.trim();
            const p = document.getElementById('logia-pass').value.trim();

            if (u.toLowerCase() === "admin" && p === "tampico2026") {
                render(database, "PANEL GRAN TESORERÍA");
                return;
            }

            // Búsqueda insensible a mayúsculas/minúsculas y espacios
            const match = database.find(l => 
                String(l.id).toLowerCase() === u.toLowerCase() && 
                String(l.pass).toLowerCase() === p.toLowerCase()
            );

            if (match) {
                const registros = database.filter(l => String(l.id).toLowerCase() === u.toLowerCase());
                render(registros, match.nombre);
            } else {
                alert("No se encontró la logia o la clave es incorrecta.");
            }
        }

        function render(lista, titulo) {
            document.getElementById('login-screen').style.display = "none";
            document.getElementById('panel').style.display = "block";
            document.getElementById('nombre-display').innerText = titulo;
            const tbody = document.getElementById('tabla-body');
            tbody.innerHTML = lista.map(l => `
                <tr>
                    <td>${l.mes || 'S/D'}</td>
                    <td>${l.monto || '---'}</td>
                    <td><span class="status-badge ${l.estado.includes('PAGADO') ? 'PAGADO' : 'PENDIENTE'}">${l.estado || 'PENDIENTE'}</span></td>
                </tr>
            `).join("");
        }

        cargarDatos();
    </script>
</body>
</html>
