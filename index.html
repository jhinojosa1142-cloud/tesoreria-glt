<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIT - Gran Logia de Tamaulipas</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Paleta Masónica Tradicional */
            --azul-profundo: #0a192f; 
            --azul-tarjeta: #112240;    
            --dorado: #f9e29b;       
            --dorado-oscuro: #c5a059;      
            --texto-suave: #e6f1ff;       
            --exito: #27ae60;
            --error: #c0392b;
        }

        body {
            font-family: 'Lora', serif;
            background-color: var(--azul-profundo);
            margin: 0;
            color: var(--texto-suave);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        h1, h2, h3 {
            font-family: 'Cinzel', serif;
            color: var(--dorado);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* Contenedor de Login */
        .login-card {
            max-width: 400px;
            margin: 80px auto;
            background-color: var(--azul-tarjeta);
            padding: 40px;
            border: 2px solid var(--dorado-oscuro);
            border-radius: 8px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            text-align: center;
        }

        .logo-img {
            width: 140px;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(249, 226, 155, 0.4));
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            background-color: rgba(255,255,255,0.05);
            border: 1px solid var(--dorado-oscuro);
            border-radius: 4px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
        }

        input::placeholder { color: rgba(230, 241, 255, 0.4); }

        button {
            width: 100%;
            background-color: var(--dorado);
            color: var(--azul-profundo);
            padding: 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Cinzel';
            font-weight: bold;
            font-size: 1rem;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
            background-color: var(--dorado-oscuro);
            transform: scale(1.02);
        }

        /* Panel de Resultados */
        #panel {
            display: none;
            max-width: 1000px;
            margin: 40px auto;
            background-color: var(--azul-tarjeta);
            padding: 30px;
            border-radius: 10px;
            border: 1px solid var(--dorado-oscuro);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--dorado);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            color: var(--texto-suave);
        }

        th {
            background-color: rgba(0,0,0,0.3);
            color: var(--dorado);
            padding: 15px;
            text-align: left;
            border-bottom: 2px solid var(--dorado-oscuro);
        }

        td {
            padding: 15px;
            border-bottom: 1px solid rgba(197, 160, 89, 0.1);
        }

        .status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            color: white;
            text-transform: uppercase;
        }

        .Pagado { background-color: var(--exito); }
        .Pendiente { background-color: var(--error); }

        footer {
            margin-top: auto;
            padding: 30px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--dorado-oscuro);
            border-top: 1px solid rgba(197, 160, 89, 0.2);
        }

        .loader-msg { font-size: 0.85rem; margin-bottom: 15px; color: var(--dorado-oscuro); }

        @media (max-width: 600px) {
            .panel-header { flex-direction: column; gap: 15px; }
            td, th { padding: 10px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <div id="login-screen" class="login-card">
        <img src="logo_moderno.png" alt="Gran Logia de Tamaulipas" class="logo-img">
        <h2>Tesorería GLT</h2>
        <div id="loader" class="loader-msg">Sincronizando con la Gran Bóveda...</div>
        
        <input type="text" id="logia-id" placeholder="No. de Logia">
        <input type="password" id="logia-pass" placeholder="Clave de Acceso">
        <button onclick="verificarAcceso()">INGRESAR AL TEMPLO</button>
    </div>

    <div id="panel" class="container">
        <div class="panel-header">
            <h2 id="nombre-display" style="margin:0;"></h2>
            <button onclick="location.reload()" style="width:auto; padding: 10px 20px; background:#444; color:white; font-size: 0.7rem;">CERRAR SESIÓN</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Concepto / Mes</th>
                    <th>Monto</th>
                    <th>Estado Actual</th>
                </tr>
            </thead>
            <tbody id="tabla-datos"></tbody>
        </table>
        
        <p style="margin-top: 30px; font-size: 0.85rem; color: var(--dorado-oscuro); text-align: center; font-style: italic;">
            "La exactitud en nuestras obligaciones fortalece las columnas de nuestro Templo."
        </p>
    </div>

    <footer>
        <p>A.·. L.·. G.·. A.·. D.·. U.·.</p>
        <p>Muy Respetable Gran Logia de Tamaulipas &copy; 2026</p>
    </footer>

    <script>
        // Enlace CSV de tu Google Sheet
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRHtXI5LY1DF7e6sHplXRgzQhk1yHaSZ7lKXUZvY2dTtkUKc29RvzZzCM6FffbYxoFWeIMst9ZKeP10/pub?output=csv";

        let database = [];

        async function cargarSistema() {
            try {
                const response = await fetch(CSV_URL);
                const data = await response.text();
                // Procesar filas (omitir encabezado)
                const filas = data.split("\n").slice(1);
                
                database = filas.map(f => {
                    const c = f.split(",");
                    return {
                        id: c[0]?.trim(),
                        pass: c[1]?.trim(),
                        nombre: c[2]?.trim(),
                        mes: c[3]?.trim(),
                        monto: c[4]?.trim(),
                        estado: c[5]?.trim()
                    };
                });
                document.getElementById('loader').innerText = "Sistema Conectado ✔";
                document.getElementById('loader').style.color = "#27ae60";
            } catch (err) {
                document.getElementById('loader').innerText = "Error de conexión con Tesorería ❌";
                document.getElementById('loader').style.color = "#c0392b";
            }
        }

        function verificarAcceso() {
            const userInput = document.getElementById('logia-id').value.trim();
            const passInput = document.getElementById('logia-pass').value.trim();

            // Acceso Administrador (Gran Tesorero)
            if (userInput === "admin" && passInput === "TAMPICO2026") {
                renderizarPanel("PANEL GLOBAL - GRAN TESORERÍA", database);
                return;
            }

            // Acceso Logia
            const match = database.find(l => l.id === userInput && l.pass === passInput);

            if (match) {
                // Filtrar todos los registros que pertenezcan a ese ID (por si hay varios meses)
                const registros = database.filter(l => l.id === userInput);
                renderizarPanel(match.nombre, registros);
            } else {
                alert("Credenciales incorrectas. Favor de verificar.");
            }
        }

        function renderizarPanel(titulo, lista) {
            document.getElementById('login-screen').style.display = "none";
            document.getElementById('panel').style.display = "block";
            document.getElementById('nombre-display').innerText = titulo;

            const tabla = document.getElementById('tabla-datos');
            tabla.innerHTML = lista.map(l => `
                <tr>
                    <td>${l.mes || 'N/A'}</td>
                    <td>${l.monto || '---'}</td>
                    <td><span class="status-badge ${l.estado}">${l.estado ? l.estado.toUpperCase() : 'PENDIENTE'}</span></td>
                </tr>
            `).join("");
        }

        cargarSistema();
    </script>
</body>
</html>
