<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIT - Gran Logia de Tamaulipas</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-profundo: #0a192f; 
            --azul-tarjeta: #112240;    
            --dorado: #f9e29b;       
            --dorado-oscuro: #c5a059;      
            --texto-suave: #e6f1ff;       
            --exito: #27ae60;
            --error: #c0392b;
        }

        body {
            font-family: 'Lora', serif;
            background-color: var(--azul-profundo);
            margin: 0;
            color: var(--texto-suave);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        h1, h2, h3 {
            font-family: 'Cinzel', serif;
            color: var(--dorado);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .login-card {
            max-width: 400px;
            margin: 80px auto;
            background-color: var(--azul-tarjeta);
            padding: 40px;
            border: 2px solid var(--dorado-oscuro);
            border-radius: 8px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            text-align: center;
        }

        .logo-img {
            width: 180px;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(249, 226, 155, 0.4));
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 12px 0;
            background-color: rgba(255,255,255,0.05);
            border: 1px solid var(--dorado-oscuro);
            border-radius: 4px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
        }

        button.btn-principal {
            width: 100%;
            background-color: var(--dorado);
            color: var(--azul-profundo);
            padding: 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Cinzel';
            font-weight: bold;
            font-size: 1rem;
            margin-top: 10px;
            transition: 0.3s;
        }

        button.btn-principal:hover {
            background-color: var(--dorado-oscuro);
            transform: scale(1.02);
        }

        #panel {
            display: none;
            max-width: 1000px;
            margin: 40px auto;
            background-color: var(--azul-tarjeta);
            padding: 30px;
            border-radius: 10px;
            border: 1px solid var(--dorado-oscuro);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--dorado);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .btn-reporte {
            background-color: var(--exito);
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 4px;
            font-family: 'Cinzel';
            font-size: 0.75rem;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            color: var(--dorado);
            padding: 15px;
            text-align: left;
            border-bottom: 2px solid var(--dorado-oscuro);
        }

        td {
            padding: 15px;
            border-bottom: 1px solid rgba(197, 160, 89, 0.1);
        }

        .status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            color: white;
        }

        .PAGADO { background-color: var(--exito); }
        .PENDIENTE { background-color: var(--error); }

        footer {
            margin-top: auto;
            padding: 30px;
            text-align: center;
            font-size: 0.8rem;
            color: var(--dorado-oscuro);
        }
    </style>
</head>
<body>

    <div id="login-screen" class="login-card">
        <img src="logo_moderno.jpg" alt="Gran Logia de Tamaulipas" class="logo-img">
        <h2>Tesorería GLT</h2>
        <div id="loader" style="margin-bottom:15px; font-size:0.8rem;">Conectando con Gran Tesorería...</div>
        
        <input type="text" id="logia-id" placeholder="No. de Logia">
        <input type="password" id="logia-pass" placeholder="Clave de Acceso">
        <button class="btn-principal" onclick="verificarAcceso()">INGRESAR</button>
    </div>

    <div id="panel">
        <div class="panel-header">
            <h2 id="nombre-display" style="margin:0;"></h2>
            <div style="display:flex; gap:10px;">
                <a id="link-reporte" href="TU_LINK_DE_FORMULARIO_AQUI" target="_blank" class="btn-reporte">REPORTAR PAGO ⬆</a>
                <button onclick="location.reload()" style="background:#444; color:white; border:none; padding:10px 15px; cursor:pointer; font-family:'Cinzel';">SALIR</button>
            </div>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Mes / Concepto</th>
                    <th>Monto</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="tabla-datos"></tbody>
        </table>
    </div>

    <footer>
        <p>A.·. L.·. G.·. A.·. D.·. U.·.</p>
        <p>Muy Respetable Gran Logia de Tamaulipas</p>
    </footer>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRHtXI5LY1DF7e6sHplXRgzQhk1yHaSZ7lKXUZvY2dTtkUKc29RvzZzCM6FffbYxoFWeIMst9ZKeP10/pub?output=csv";
        let database = [];

        async function cargarDatos() {
            try {
                const response = await fetch(CSV_URL);
                const data = await response.text();
                // Limpieza de datos: divide por filas y limpia espacios
                const filas = data.split(/\r?\n/).slice(1);
                database = filas.map(f => {
                    const c = f.split(",");
                    return {
                        id: (c[0] || "").trim(),
                        pass: (c[1] || "").trim(),
                        nombre: (c[2] || "").trim(),
                        mes: (c[3] || "").trim(),
                        monto: (c[4] || "").trim(),
                        estado: (c[5] || "").trim().toUpperCase()
                    };
                }).filter(item => item.id !== ""); // Ignora filas vacías
                document.getElementById('loader').innerText = "Sistema Listo ✔";
            } catch (e) {
                document.getElementById('loader').innerText = "Error de conexión ❌";
            }
        }

        function verificarAcceso() {
            const user = document.getElementById('logia-id').value.trim().toLowerCase();
            const pass = document.getElementById('logia-pass').value.trim().toLowerCase();

            // Admin
            if (user === "admin" && pass === "tampico2026") {
                renderizar(database, "PANEL GRAN TESORERÍA");
                return;
            }

            // Logia (Busca coincidencia exacta ignorando mayúsculas)
            const match = database.find(l => l.id.toLowerCase() === user && l.pass.toLowerCase() === pass);

            if (match) {
                const misRegistros = database.filter(l => l.id.toLowerCase() === user);
                renderizar(misRegistros, match.nombre);
            } else {
                alert("Credenciales incorrectas. Verifica tu número y clave.");
            }
        }

        function renderizar(lista, titulo) {
            document.getElementById('login-screen').style.display = "none";
            document.getElementById('panel').style.display = "block";
            document.getElementById('nombre-display').innerText = titulo;
            const tabla = document.getElementById('tabla-datos');
            tabla.innerHTML = lista.map(l => `
                <tr>
                    <td>${l.mes}</td>
                    <td>${l.monto}</td>
                    <td><span class="status-badge ${l.estado}">${l.estado}</span></td>
                </tr>
            `).join("");
        }

        cargarDatos();
    </script>
</body>
</html>
