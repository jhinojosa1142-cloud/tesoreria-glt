<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identificación Masónica | Plataforma Hiram</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --azul-obscuro: #0a192f;
            --azul-card: #112240;
            --dorado: #f9e29b;
            --dorado-mate: #c5a059;
            --blanco: #e6f1ff;
            --rojo-error: #e74c3c;
            --verde-exito: #2ecc71;
        }

        body {
            font-family: 'Lora', serif;
            background-color: var(--azul-obscuro);
            color: var(--blanco);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header { padding: 40px 20px; text-align: center; }
        .logo-escudo { width: 80px; filter: drop-shadow(0 0 8px var(--dorado)); margin-bottom: 10px; }
        h1 { font-family: 'Cinzel', serif; color: var(--dorado); font-size: 1.5rem; margin: 0; }

        .main-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }

        .registro-card {
            background: var(--azul-card);
            border: 1px solid var(--dorado-mate);
            border-radius: 12px;
            padding: 35px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            text-align: center;
        }

        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label {
            display: block; font-family: 'Cinzel', serif; font-size: 0.7rem;
            color: var(--dorado-mate); margin-bottom: 8px;
        }

        input {
            width: 100%; padding: 12px; background: var(--azul-obscuro);
            border: 1px solid var(--dorado-mate); border-radius: 4px;
            color: white; font-family: 'Lora', serif; box-sizing: border-box; outline: none;
        }

        .btn-validar {
            width: 100%; padding: 15px; background: var(--dorado-mate);
            color: var(--azul-obscuro); border: none; border-radius: 4px;
            font-family: 'Cinzel', serif; font-weight: bold; cursor: pointer; transition: 0.3s;
        }

        .btn-validar:hover { background: var(--dorado); }

        #msg-status { margin-top: 20px; font-size: 0.85rem; padding: 10px; border-radius: 4px; display: none; }
        
        .btn-regresar {
            display: inline-block; margin-top: 20px; color: var(--dorado-mate);
            text-decoration: none; font-size: 0.8rem; font-family: 'Cinzel';
        }
    </style>
</head>
<body>

    <header>
        <img src="logo_moderno.png" class="logo-escudo">
        <h1>PLATAFORMA HIRAM</h1>
    </header>

    <div class="main-container">
        <div class="registro-card">
            <h3 style="font-family:'Cinzel'; color:var(--dorado); margin-bottom:20px;">VALIDACIÓN DE MIEMBRO</h3>
            
            <form onsubmit="validarHermano(event)">
                <div class="form-group">
                    <label>Nombre Completo (Sin acentos)</label>
                    <input type="text" id="nombreInput" placeholder="EJ: JUAN PEREZ LOPEZ" required>
                </div>
                
                <div class="form-group">
                    <label>Número de Afiliación</label>
                    <input type="text" id="idInput" placeholder="ID UNICO" required>
                </div>

                <button type="submit" id="btnSubmit" class="btn-validar">VERIFICAR CENSO</button>
            </form>

            <div id="msg-status"></div>

            <a href="index.html" class="btn-regresar">← VOLVER AL INICIO</a>
        </div>
    </div>

    <script>
        // USA EL LINK DE TU GOOGLE SHEET AQUÍ
        const URL_CENSO = "TU_URL_DE_GOOGLE_SHEETS_CSV";

        function validarHermano(e) {
            e.preventDefault();
            const nombre = document.getElementById('nombreInput').value.trim().toUpperCase();
            const idAfiliacion = document.getElementById('idInput').value.trim();
            const btn = document.getElementById('btnSubmit');
            const status = document.getElementById('msg-status');

            btn.disabled = true;
            btn.innerText = "BUSCANDO...";

            Papa.parse(URL_CENSO, {
                download: true,
                header: true,
                complete: function(results) {
                    const hermano = results.data.find(row => 
                        row.nombre_completo.toUpperCase() === nombre && 
                        row.numero_afiliacion === idAfiliacion
                    );

                    if (hermano) {
                        status.style.display = 'block';
                        status.style.backgroundColor = "rgba(46, 204, 113, 0.2)";
                        status.style.color = "var(--verde-exito)";
                        status.innerText = "✓ Identidad confirmada. Generando Pasaporte...";
                        
                        // Guardamos datos para pasaporte.html
                        sessionStorage.setItem('hermanoValidado', JSON.stringify(hermano));

                        setTimeout(() => { window.location.href = "pasaporte.html"; }, 1500);
                    } else {
                        status.style.display = 'block';
                        status.style.backgroundColor = "rgba(231, 76, 60, 0.2)";
                        status.style.color = "var(--rojo-error)";
                        status.innerText = "✕ Datos no encontrados en el censo oficial.";
                        btn.disabled = false;
                        btn.innerText = "VERIFICAR CENSO";
                    }
                }
            });
        }
    </script>
</body>
</html>
